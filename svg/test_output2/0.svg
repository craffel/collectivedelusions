<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%">
    <defs>
        <!-- Background Gradients -->
        <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#F4F1DE"/>
            <stop offset="100%" stop-color="#EAE3C8"/>
        </linearGradient>
        
        <linearGradient id="mirrorGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#E0FBFC"/>
            <stop offset="100%" stop-color="#98C1D9"/>
        </linearGradient>

        <linearGradient id="woodGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8B5A2B"/>
            <stop offset="100%" stop-color="#6B4226"/>
        </linearGradient>

        <!-- The Sneaker Symbol for reuse (on foot, on floor, in mirror) -->
        <g id="sneaker-def">
            <g transform="translate(0,0)">
                <!-- Back/Heel -->
                <path d="M 0 80 L -10 130 C -15 150, 0 160, 20 160 L 100 160 L 100 80 Z" fill="#E63946"/>
                <!-- Toe cap -->
                <path d="M 100 80 L 100 160 C 130 160, 140 130, 120 100 C 115 90, 110 80, 100 80 Z" fill="#F1FAEE"/>
                <!-- Sole Base -->
                <path d="M -10 160 L 125 160 C 135 160, 135 180, 125 180 L 0 180 C -20 180, -25 160, -10 160 Z" fill="#F1FAEE"/>
                <!-- Racing stripe on sole -->
                <path d="M -5 170 L 120 170" stroke="#1D3557" stroke-width="4" fill="none" stroke-linecap="round"/>
                <!-- Tongue and Upper -->
                <path d="M 0 80 L 30 30 C 40 10, 60 20, 60 40 L 70 80 Z" fill="#E63946"/>
                <!-- Laces -->
                <path d="M 40 40 L 80 80" stroke="#F1FAEE" stroke-width="8" stroke-linecap="round"/>
                <path d="M 40 50 L 65 40" stroke="#F1FAEE" stroke-width="3"/>
                <path d="M 50 65 L 75 55" stroke="#F1FAEE" stroke-width="3"/>
                <!-- Star Logo Circle -->
                <circle cx="25" cy="110" r="15" fill="#F1FAEE"/>
                <!-- Star Logo Path -->
                <polygon points="25,100 28,107 35,107 29,112 32,119 25,114 18,119 21,112 15,107 22,107" fill="#1D3557"/>
            </g>
        </g>

        <!-- Sparkles around the new shoe -->
        <g id="sparkle-group">
            <g stroke="#E63946" stroke-width="3" fill="none" stroke-linecap="round">
                <path d="M 520 80 L 520 60"/>
                <path d="M 550 90 L 570 80"/>
                <path d="M 490 90 L 470 80"/>
            </g>
            <path d="M 480 120 Q 490 120 490 110 Q 490 120 500 120 Q 490 120 490 130 Q 490 120 480 120 Z" fill="#FFD166"/>
            <path d="M 570 140 Q 575 140 575 135 Q 575 140 580 140 Q 575 140 575 145 Q 575 140 570 140 Z" fill="#FFD166"/>
        </g>

        <!-- Clip path to keep mirror reflections strictly inside the glass -->
        <clipPath id="mirror-clip">
            <polygon points="760,165 885,192 838,535 712,508"/>
        </clipPath>
    </defs>

    <!-- ================= BACKGROUND ================= -->
    <rect width="1000" height="700" fill="url(#bgGrad)"/>
    
    <!-- Hardwood floor / Floor area -->
    <path d="M 0 500 Q 500 480 1000 500 L 1000 700 L 0 700 Z" fill="#E07A5F" opacity="0.3"/>
    
    <!-- Circular Plush Rug -->
    <ellipse cx="500" cy="580" rx="400" ry="90" fill="#81B29A" opacity="0.5"/>
    <ellipse cx="500" cy="580" rx="380" ry="80" fill="none" stroke="#2A9D8F" stroke-width="4" stroke-dasharray="10 15" opacity="0.6"/>

    <!-- Contact Shadows -->
    <ellipse cx="330" cy="620" rx="120" ry="15" fill="#000" opacity="0.15"/>
    <ellipse cx="180" cy="620" rx="80" ry="10" fill="#000" opacity="0.15"/>
    <ellipse cx="380" cy="630" rx="60" ry="8" fill="#000" opacity="0.15"/>
    <ellipse cx="650" cy="640" rx="60" ry="10" fill="#000" opacity="0.15"/>
    <polygon points="700,520 850,550 820,580 670,550" fill="#000" opacity="0.15"/>

    <!-- ================= PROPS (BACKGROUND) ================= -->
    <!-- Floor Mirror Base Frame -->
    <path d="M 800 540 L 800 600" stroke="#9A6A44" stroke-width="12" stroke-linecap="round"/>
    <path d="M 750 530 L 730 590" stroke="#9A6A44" stroke-width="12" stroke-linecap="round"/>
    <path d="M 850 550 L 870 610" stroke="#9A6A44" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Mirror Frame Outer & Inner -->
    <polygon points="740,140 910,170 860,560 690,530" fill="#9A6A44"/>
    <polygon points="750,150 900,180 850,550 700,520" fill="#C08552"/>

    <!-- Mirror Glass Background -->
    <polygon points="760,165 885,192 838,535 712,508" fill="url(#mirrorGrad)"/>

    <!-- Shoebox (Open) -->
    <g id="shoebox">
        <!-- Inside back wall -->
        <polygon points="100,550 220,550 250,490 130,490" fill="#E29578"/>
        <!-- Tissue paper overflowing -->
        <path d="M 110 480 Q 150 440 190 490 Q 230 430 270 480 L 230 540 L 130 540 Z" fill="#F8EDEB" opacity="0.9"/>
        <!-- Extra shoe in the box (Blue Boot) -->
        <path d="M 150 460 Q 170 440 190 510 L 140 510 Z" fill="#457B9D"/>
        <!-- Box Front Walls -->
        <polygon points="100,550 220,550 220,620 100,620" fill="#FFB5A7"/>
        <polygon points="220,550 250,490 250,560 220,620" fill="#FEC5BB"/>
        <!-- Box details/stripes -->
        <path d="M 120 580 L 200 580" stroke="#F4F1DE" stroke-width="4" stroke-linecap="round"/>
        <path d="M 140 600 L 180 600" stroke="#F4F1DE" stroke-width="4" stroke-linecap="round"/>
        <!-- Box Lid leaning against box -->
        <polygon points="50,620 110,480 130,480 70,620" fill="#E29578"/>
        <polygon points="70,620 130,480 140,490 80,630" fill="#FEC5BB"/>
    </g>

    <!-- ================= GRASSHOPPER (BACKGROUND LEGS) ================= -->
    <!-- Left Middle Leg -->
    <path d="M 310 370 L 330 420 L 360 420" stroke="#5B8A12" stroke-width="8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Left Hind Leg -->
    <path d="M 290 400 L 220 300 L 250 280 Z" fill="#5B8A12"/> <!-- Thigh -->
    <path d="M 235 290 L 350 500 L 340 510 Z" fill="#5B8A12"/> <!-- Calf -->
    <path d="M 345 505 L 380 520 L 385 530 L 340 515 Z" fill="#5B8A12"/> <!-- Foot Base -->
    <path d="M 380 520 L 390 515 L 395 520 L 385 530 Z" fill="#7CB518"/> <!-- Toes -->

    <!-- ================= FITTING STOOL ================= -->
    <g id="stool">
        <!-- Back Leg -->
        <path d="M 280 470 L 260 580" stroke="#4A2F1D" stroke-width="14" stroke-linecap="round"/>
        <!-- Right Leg -->
        <path d="M 380 480 L 400 590" stroke="#5C4033" stroke-width="14" stroke-linecap="round"/>
        <!-- Front Leg -->
        <path d="M 330 490 L 330 610" stroke="#6B4226" stroke-width="14" stroke-linecap="round"/>
        <!-- Stool Seat Thickness -->
        <ellipse cx="330" cy="460" rx="90" ry="25" fill="#4A2F1D"/>
        <!-- Stool Seat Top -->
        <ellipse cx="330" cy="450" rx="90" ry="25" fill="url(#woodGrad)"/>
        <!-- Seat Highlights / Wood rings -->
        <path d="M 280 445 Q 330 460 380 445" stroke="#4A2F1D" stroke-width="2" fill="none" opacity="0.4"/>
        <path d="M 290 455 Q 330 470 370 455" stroke="#4A2F1D" stroke-width="2" fill="none" opacity="0.4"/>
    </g>

    <!-- ================= GRASSHOPPER (MAIN BODY) ================= -->
    <!-- Abdomen -->
    <path d="M 360 430 C 300 480, 200 460, 180 400 C 160 340, 240 360, 310 370 Z" fill="#7CB518"/>
    <!-- Cerci (tail tips) -->
    <path d="M 180 400 L 150 410 L 170 390 Z" fill="#7CB518"/>
    <!-- Abdomen Segments -->
    <path d="M 210 440 Q 230 400 210 360" stroke="#5B8A12" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 250 455 Q 270 410 250 365" stroke="#5B8A12" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 290 460 Q 310 420 290 370" stroke="#5B8A12" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Folded Wings -->
    <path d="M 310 360 C 250 330, 150 340, 120 390 C 140 400, 200 370, 330 380 Z" fill="#A8D5BA" opacity="0.9"/>
    <path d="M 320 370 C 260 340, 160 350, 130 400 C 150 410, 210 380, 340 390 Z" fill="#81B29A" opacity="0.9"/>
    <!-- Wing Venation Lines -->
    <path d="M 170 380 L 300 370" stroke="#5C8A75" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M 190 390 L 280 380" stroke="#5C8A75" stroke-width="2" fill="none" opacity="0.6"/>

    <!-- Right Hind Leg (Dramatically raised high to admire the shoe) -->
    <!-- Thigh (Thick Muscle) -->
    <path d="M 330 380 C 300 380, 220 240, 180 190 C 160 210, 260 360, 310 410 Z" fill="#96D01D"/>
    <!-- Muscle Herringbone Pattern -->
    <path d="M 190 200 L 260 330" stroke="#7CB518" stroke-width="3" stroke-linecap="round"/>
    <path d="M 210 200 L 280 330" stroke="#7CB518" stroke-width="3" stroke-linecap="round"/>
    <path d="M 230 200 L 300 330" stroke="#7CB518" stroke-width="3" stroke-linecap="round"/>
    <!-- Knee Joint -->
    <circle cx="180" cy="190" r="15" fill="#7CB518"/>
    <!-- Calf (Long thin section extended towards mirror) -->
    <path d="M 180 190 L 520 220 L 515 230 L 170 200 Z" fill="#7CB518"/>
    <!-- Spikes along back/bottom of calf -->
    <polygon points="250,207 260,217 265,208" fill="#5B8A12"/>
    <polygon points="320,213 330,223 335,214" fill="#5B8A12"/>
    <polygon points="390,220 400,230 405,221" fill="#5B8A12"/>
    <polygon points="460,226 470,236 475,227" fill="#5B8A12"/>

    <!-- Thorax -->
    <path d="M 290 360 C 310 280, 380 290, 380 370 C 360 420, 310 420, 290 360 Z" fill="#96D01D"/>
    
    <!-- Pronotum (Saddle Shield) -->
    <path d="M 340 280 C 370 270, 390 290, 380 330 C 350 350, 320 330, 330 290 Z" fill="#5B8A12"/>

    <!-- Head -->
    <path d="M 350 310 C 340 240, 420 220, 440 260 C 460 300, 400 340, 350 310 Z" fill="#7CB518"/>
    
    <!-- Big Expressive Compound Eye -->
    <!-- Base -->
    <ellipse cx="420" cy="250" rx="25" ry="35" fill="#1A1A1A" transform="rotate(15 420 250)"/>
    <!-- Inner shading/reflection -->
    <path d="M 405 230 C 420 220, 440 230, 445 250 C 445 270, 420 280, 405 270 C 415 260, 415 240, 405 230 Z" fill="#333333"/>
    <!-- Eye Highlights -->
    <ellipse cx="425" cy="240" rx="8" ry="12" fill="#FFFFFF" transform="rotate(15 425 240)"/>
    <ellipse cx="415" cy="265" rx="3" ry="5" fill="#FFFFFF"/>

    <!-- Mandible / Mouth parts -->
    <path d="M 425 315 L 430 325 L 420 320 Z" fill="#5B8A12"/>
    <!-- Open Mouth in awe -->
    <path d="M 425 310 Q 440 320 445 305 Q 435 325 425 310 Z" fill="#2B3A0A"/>
    
    <!-- Blush -->
    <ellipse cx="385" cy="285" rx="14" ry="9" fill="#FF4D6D" opacity="0.4" transform="rotate(-15 385 285)"/>

    <!-- Antennae -->
    <path d="M 390 230 C 370 150, 450 100, 500 120" stroke="#7CB518" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="500" cy="120" r="5" fill="#7CB518"/>
    <path d="M 370 230 C 330 140, 380 80, 430 70" stroke="#5B8A12" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="430" cy="70" r="5" fill="#5B8A12"/>

    <!-- Snappy Dapper Bowtie -->
    <g transform="translate(370, 345) rotate(-15)">
        <path d="M 0 0 L -20 -15 L -20 15 Z" fill="#FFB703"/>
        <path d="M 0 0 L 20 -15 L 20 15 Z" fill="#FFB703"/>
        <circle cx="0" cy="0" r="6" fill="#FB8500"/>
    </g>

    <!-- Right Middle Leg (Foreground, resting on stool) -->
    <path d="M 320 380 L 360 450 L 390 450" stroke="#7CB518" stroke-width="10" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Right Front Arm (Hand resting on chin affectionately) -->
    <path d="M 350 360 L 390 380 L 400 300" stroke="#7CB518" stroke-width="8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Hand -->
    <circle cx="400" cy="300" r="6" fill="#96D01D"/>
    <!-- Little fingers -->
    <path d="M 400 300 C 405 290, 415 285, 420 295" stroke="#7CB518" stroke-width="3" fill="none" stroke-linecap="round"/>


    <!-- ================= THE NEW SNEAKER (ON THE FOOT) ================= -->
    <use href="#sneaker-def" transform="translate(520, 220) rotate(-20) translate(-20, -80)"/>
    <use href="#sparkle-group"/>


    <!-- ================= MIRROR REFLECTION ================= -->
    <g clip-path="url(#mirror-clip)">
        <!-- Scaled and translated flipped version of the leg, shoe, and sparkles -->
        <!-- x scale is -0.9, y scale is 0.9. Translate carefully to keep in mirror bounds. -->
        <g transform="translate(1260, 60) scale(-0.9, 0.9)">
            
            <!-- Reflected Calf -->
            <path d="M 180 190 L 520 220 L 515 230 L 170 200 Z" fill="#6B9C10"/>
            <polygon points="250,207 260,217 265,208" fill="#4B7A02"/>
            <polygon points="320,213 330,223 335,214" fill="#4B7A02"/>
            <polygon points="390,220 400,230 405,221" fill="#4B7A02"/>
            <polygon points="460,226 470,236 475,227" fill="#4B7A02"/>

            <!-- Reflected Shoe -->
            <use href="#sneaker-def" transform="translate(520, 220) rotate(-20) translate(-20, -80)"/>
            
            <!-- Reflected Sparkles -->
            <use href="#sparkle-group"/>
        </g>
        
        <!-- Mirror Glass Glare / Gloss Lines Overlay -->
        <polygon points="760,200 810,210 740,400 718,390" fill="#FFFFFF" opacity="0.25"/>
        <polygon points="800,175 830,180 770,300 740,290" fill="#FFFFFF" opacity="0.15"/>
    </g>


    <!-- ================= FOREGROUND PROPS (OTHER SHOES) ================= -->
    <!-- The Matching Red Sneaker on the Floor -->
    <g transform="translate(380, 600) scale(0.9) rotate(5) translate(-50, -160)">
        <use href="#sneaker-def"/>
        <!-- Price Tag -->
        <path d="M -10 80 L -40 50 L -30 30 L 0 60 Z" fill="#F4A261"/>
        <circle cx="-25" cy="45" r="3" fill="#FFFFFF"/>
        <path d="M -25 45 C -15 60, 0 70, 0 80" stroke="#333333" stroke-width="1" fill="none"/>
        <path d="M -32 42 L -20 54 M -28 38 L -16 50" stroke="#333333" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Fancy Pink Stiletto Heel on Floor -->
    <g id="pink-heel" transform="translate(620, 560) scale(0.8)">
        <!-- Inner shoe/Insole -->
        <path d="M 10 10 C 30 30, 60 40, 90 20 L 110 50 C 70 70, 30 50, 0 30 Z" fill="#B5179E"/>
        <!-- Outer Shoe -->
        <path d="M 0 30 C 30 50, 70 70, 110 50 C 120 70, 100 90, 80 90 C 50 90, 20 70, 0 30 Z" fill="#F72585"/>
        <!-- Heel (Stiletto) -->
        <path d="M 5 45 L -5 120 L 2 120 L 15 52 Z" fill="#7209B7"/>
        <!-- Toe platform -->
        <path d="M 80 90 C 100 90, 115 70, 110 50 C 115 70, 105 120, 80 120 C 70 120, 60 100, 80 90 Z" fill="#7209B7"/>
    </g>

</svg>