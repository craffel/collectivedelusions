<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Table -->
  <rect x="30" y="150" width="140" height="10" fill="#5D4037" />
  <rect x="40" y="160" width="120" height="5" fill="#3E2723" />
  
  <!-- Fabric with Drape -->
  <path d="M50 150 Q 80 120 110 150 T 170 150" fill="#F48FB1" stroke="#880E4F" stroke-width="1.5" />
  
  <!-- Spool of Thread -->
  <rect x="150" y="135" width="10" height="15" fill="#424242" rx="2" />
  <line x1="155" y1="135" x2="110" y2="145" stroke="#FF5722" stroke-width="1" />

  <!-- Crow Body -->
  <ellipse cx="120" cy="115" rx="25" ry="30" fill="#212121" />
  <path d="M100 130 Q 90 150 110 145" fill="#212121" /> <!-- Tail feathers -->
  
  <!-- Crow Head -->
  <circle cx="120" cy="85" r="18" fill="#212121" />
  
  <!-- Eye with highlight -->
  <circle cx="126" cy="80" r="4" fill="white" />
  <circle cx="127" cy="79" r="1.5" fill="black" />
  
  <!-- Beak -->
  <polygon points="138,85 170,90 138,96" fill="#FFC107" />
  
  <!-- Wing holding needle -->
  <path d="M105 110 C 80 100 70 80 85 70" stroke="#212121" stroke-width="14" fill="none" stroke-linecap="round" />
  
  <!-- Needle -->
  <line x1="85" y1="70" x2="65" y2="50" stroke="#CFD8DC" stroke-width="2" />
  <circle cx="85" cy="70" r="1" fill="#ECEFF1" /> <!-- Eye of needle -->
  
  <!-- Measuring Tape -->
  <path d="M95 130 C 130 160 180 150 190 120" stroke="#FFEB3B" stroke-width="3" fill="none" stroke-dasharray="6 3" stroke-linecap="round" />
  
  <!-- Legs (more realistic bird feet) -->
  <g stroke="#FFC107" stroke-width="2" stroke-linecap="round">
    <path d="M110 142 L 105 155 M 100 155 L 110 155" />
    <path d="M130 142 L 135 155 M 130 155 L 140 155" />
  </g>
</svg>