<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" />
  
  <!-- Dress Form -->
  <path d="M70 148 C 70 100, 130 100, 130 148 L 135 180 L 65 180 Z" fill="url(#silk)" />
  <path d="M70 148 C 70 100, 130 100, 130 148" stroke="#FCE4EC" stroke-width="1" fill="none" stroke-dasharray="2 2" /> <!-- Stitching detail -->
  <ellipse cx="100" cy="100" rx="15" ry="10" fill="#F8BBD0" />
  <rect x="70" y="145" width="60" height="3" fill="#C2185B" rx="1" />
  
  <!-- Crow Body -->
  <ellipse cx="140" cy="130" rx="22" ry="26" fill="url(#feather)" />
  
  <!-- Head -->
  <circle cx="145" cy="100" r="18" fill="#121212" />
  <circle cx="152" cy="98" r="2" fill="white" /> <!-- Eye -->
  <path d="M135 90 C 135 80, 155 80, 155 90" fill="#121212" /> 
  
  <!-- Glasses -->
  <circle cx="140" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <circle cx="152" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <line x1="145" y1="98" x2="147" y2="98" stroke="#FFD700" stroke-width="1" />
  
  <!-- Beak -->
  <polygon points="160,102 195,106 160,110" fill="#FFC107" />
  
  <!-- Wing & Sewing Action -->
  <path d="M125 125 C 100 115, 85 135, 95 150" stroke="#333" stroke-width="12" fill="none" stroke-linecap="round" />
  <line x1="95" y1="150" x2="85" y2="160" stroke="#CFD8DC" stroke-width="2" stroke-linecap="round" />
  
  <!-- Measuring Tape -->
  <path d="M135 110 Q 120 115, 118 130" stroke="#FDD835" stroke-width="3" fill="none" stroke-linecap="round" />
  
  <!-- Scissors (New Prop) -->
  <g transform="translate(30, 160) scale(0.5)">
    <circle cx="0" cy="0" r="6" stroke="#B0BEC5" stroke-width="2" fill="none" />
    <circle cx="12" cy="0" r="6" stroke="#B0BEC5" stroke-width="2" fill="none" />
    <line x1="6" y1="0" x2="20" y2="-15" stroke="#B0BEC5" stroke-width="2" />
    <line x1="6" y1="0" x2="20" y2="15" stroke="#B0BEC5" stroke-width="2" />
  </g>
  
  <!-- Legs -->
  <path d="M135 156 L 132 175 M 145 156 L 148 175" stroke="#5D4037" stroke-width="3" stroke-linecap="round" />
</svg>