<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#333" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="6" fill="#4E342E" rx="2" />
  
  <!-- Dress Form -->
  <path d="M70 148 C 70 100, 130 100, 130 148 L 135 180 L 65 180 Z" fill="url(#silk)" filter="url(#shadow)" />
  <path d="M100 100 L 100 148" stroke="#FCE4EC" stroke-width="0.5" stroke-dasharray="2 2" />
  <ellipse cx="100" cy="100" rx="12" ry="8" fill="#F8BBD0" />
  
  <!-- Crow Body -->
  <ellipse cx="140" cy="130" rx="20" ry="24" fill="url(#feather)" />
  
  <!-- Head -->
  <circle cx="145" cy="100" r="16" fill="#121212" />
  <circle cx="150" cy="97" r="1.5" fill="white" />
  
  <!-- Glasses -->
  <g stroke="#FFD700" stroke-width="1" fill="none">
    <circle cx="140" cy="98" r="4.5" />
    <circle cx="152" cy="98" r="4.5" />
    <line x1="144.5" y1="98" x2="147.5" y2="98" />
  </g>
  
  <!-- Beak -->
  <polygon points="158,100 190,103 158,106" fill="#FFC107" />
  
  <!-- Wing & Needle -->
  <path d="M125 125 C 105 115, 90 135, 95 145" stroke="#424242" stroke-width="8" fill="none" stroke-linecap="round" />
  <line x1="95" y1="145" x2="85" y2="155" stroke="#CFD8DC" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Measuring Tape -->
  <path d="M132 110 Q 120 115, 115 130" stroke="#FDD835" stroke-width="2.5" fill="none" stroke-linecap="round" />
  
  <!-- Scissors (Refined) -->
  <g transform="translate(35, 165) scale(0.4)">
    <circle cx="0" cy="0" r="8" stroke="#90A4AE" stroke-width="3" fill="none" />
    <circle cx="16" cy="0" r="8" stroke="#90A4AE" stroke-width="3" fill="none" />
    <line x1="8" y1="0" x2="25" y2="-20" stroke="#90A4AE" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="0" x2="25" y2="20" stroke="#90A4AE" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Legs -->
  <path d="M135 154 L 132 170 M 145 154 L 148 170" stroke="#3E2723" stroke-width="2" stroke-linecap="round" />
</svg>