<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#444" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" />
  
  <!-- Dress Form -->
  <path d="M75 148 C 70 100, 130 100, 125 148 L 135 180 L 65 180 Z" fill="url(#silk)" />
  <ellipse cx="100" cy="100" rx="15" ry="10" fill="#F8BBD0" stroke="#880E4F" stroke-width="0.5" />
  
  <!-- Crow Body -->
  <ellipse cx="140" cy="130" rx="22" ry="26" fill="url(#feather)" />
  
  <!-- Head & Beak -->
  <circle cx="145" cy="100" r="18" fill="#121212" />
  <path d="M160 100 L 195 105 L 160 110 Z" fill="#FFC107" />
  
  <!-- Glasses -->
  <circle cx="140" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <circle cx="152" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <path d="M145 98 L 147 98" stroke="#FFD700" stroke-width="1" />
  
  <!-- Wing (Arm) holding a needle -->
  <path d="M125 130 C 110 125, 95 135, 90 140" stroke="#222" stroke-width="10" fill="none" stroke-linecap="round" />
  <line x1="90" y1="140" x2="85" y2="135" stroke="#B0BEC5" stroke-width="1" />
  
  <!-- Measuring Tape -->
  <path d="M140 115 Q 120 120, 115 140" stroke="#FDD835" stroke-width="2" fill="none" stroke-dasharray="4 2" />
  
  <!-- Scissors on Table -->
  <g transform="translate(45, 165) rotate(-20) scale(0.7)">
    <circle cx="0" cy="0" r="6" stroke="#E0E0E0" stroke-width="2" fill="none" />
    <circle cx="12" cy="0" r="6" stroke="#E0E0E0" stroke-width="2" fill="none" />
    <path d="M6 0 L 22 -15 M6 0 L 22 15" stroke="#E0E0E0" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Pin Cushion -->
  <circle cx="25" cy="145" r="7" fill="#D32F2F" />
  <line x1="25" y1="138" x2="25" y2="142" stroke="white" stroke-width="1" />
  
  <!-- Feet -->
  <path d="M132 154 L 130 160 M142 154 L 144 160" stroke="#212121" stroke-width="3" stroke-linecap="round" />
</svg>