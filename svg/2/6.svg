<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" />
  <rect x="30" y="158" width="140" height="4" fill="#3E2723" />
  
  <!-- Pin Cushion -->
  <circle cx="40" cy="148" r="6" fill="#F44336" />
  <line x1="40" y1="142" x2="40" y2="150" stroke="silver" stroke-width="1" />

  <!-- Dress Form -->
  <path d="M70 148 C 70 100, 130 100, 130 148 L 135 180 L 65 180 Z" fill="url(#silk)" />
  <ellipse cx="100" cy="100" rx="15" ry="10" fill="#F8BBD0" />
  <rect x="70" y="145" width="60" height="3" fill="#C2185B" /> <!-- Waist band -->
  
  <!-- Crow Body -->
  <ellipse cx="140" cy="130" rx="22" ry="26" fill="url(#feather)" />
  
  <!-- Measuring Tape (Around Neck) -->
  <path d="M135 115 Q 120 125, 125 140" stroke="#FDD835" stroke-width="3" fill="none" stroke-linecap="round" />
  
  <!-- Wing (Sewing) -->
  <path d="M125 125 C 100 115, 85 130, 100 145" stroke="#212121" stroke-width="14" fill="none" stroke-linecap="round" />
  
  <!-- Needle & Thread -->
  <line x1="100" y1="145" x2="92" y2="155" stroke="#CFD8DC" stroke-width="2" stroke-linecap="round" />
  <path d="M92 155 Q 110 145, 130 148" stroke="#FFF" stroke-width="1" fill="none" stroke-dasharray="2 2" />
  
  <!-- Head -->
  <circle cx="145" cy="100" r="18" fill="#121212" />
  <path d="M135 90 C 135 80, 155 80, 155 90" fill="#121212" /> <!-- Tuft -->
  
  <!-- Glasses -->
  <circle cx="140" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <circle cx="152" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <line x1="145" y1="98" x2="147" y2="98" stroke="#FFD700" stroke-width="1" />
  
  <!-- Beak -->
  <polygon points="160,102 195,108 160,112" fill="#FFC107" />
  
  <!-- Legs -->
  <path d="M135 156 L 132 175 M 145 156 L 148 175" stroke="#5D4037" stroke-width="3" stroke-linecap="round" />
</svg>