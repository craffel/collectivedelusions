<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Table Surface -->
  <rect x="20" y="150" width="160" height="10" fill="#3E2723" rx="2" />
  
  <!-- Dress on Mannequin -->
  <path d="M70 150 Q 70 110 100 110 Q 130 110 130 150 Z" fill="#EC407A" stroke="#880E4F" stroke-width="2" />
  <circle cx="100" cy="105" r="8" fill="#F8BBD0" />
  <!-- Seam line -->
  <line x1="100" y1="113" x2="100" y2="150" stroke="#AD1457" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- Crow Body -->
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
  </defs>
  
  <!-- Tail feathers -->
  <path d="M150 140 Q 170 160 160 170 Q 150 150 150 140" fill="#000" />
  
  <!-- Body -->
  <ellipse cx="140" cy="120" rx="20" ry="25" fill="url(#feather)" />
  
  <!-- Head -->
  <circle cx="140" cy="90" r="16" fill="#000" />
  
  <!-- Beak -->
  <polygon points="155,90 180,95 155,100" fill="#FFC107" />
  
  <!-- Eye -->
  <circle cx="145" cy="85" r="3.5" fill="white" />
  <circle cx="146" cy="84" r="1.5" fill="black" />
  
  <!-- Working Wing/Needle -->
  <path d="M130 110 C 110 100 100 110 90 120" stroke="#333" stroke-width="8" fill="none" stroke-linecap="round" />
  <!-- Needle -->
  <line x1="90" y1="120" x2="75" y2="135" stroke="#CFD8DC" stroke-width="2" stroke-linecap="round" />
  <!-- Thread -->
  <path d="M90 120 Q 85 110 95 110" stroke="#FFF" stroke-width="1" fill="none" />
  
  <!-- Measuring Tape -->
  <path d="M60 150 C 70 130 90 135 100 140" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="4 2" />
  
  <!-- Crow Legs -->
  <path d="M135 145 L 130 160 M 145 145 L 150 160" stroke="#FBC02D" stroke-width="3" stroke-linecap="round" />
</svg>