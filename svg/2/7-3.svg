<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#333" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" />
  
  <!-- Dress Form -->
  <g filter="url(#shadow)">
    <path d="M70 148 C 70 100, 130 100, 130 148 L 135 180 L 65 180 Z" fill="url(#silk)" />
    <ellipse cx="100" cy="100" rx="15" ry="10" fill="#F8BBD0" />
  </g>
  
  <!-- Crow Body -->
  <ellipse cx="140" cy="130" rx="22" ry="26" fill="url(#feather)" />
  
  <!-- Head -->
  <circle cx="145" cy="100" r="18" fill="#121212" />
  <!-- Glasses -->
  <circle cx="140" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <circle cx="152" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <line x1="145" y1="98" x2="147" y2="98" stroke="#FFD700" stroke-width="1" />
  <!-- Eye -->
  <circle cx="152" cy="96" r="2" fill="white" />
  <circle cx="152.5" cy="96" r="0.7" fill="black" />
  
  <!-- Beak -->
  <path d="M160 100 L 190 105 L 160 110 Z" fill="#FFC107" />
  
  <!-- Sewing Action -->
  <path d="M125 125 C 110 120, 95 130, 90 140" stroke="#444" stroke-width="8" fill="none" stroke-linecap="round" />
  <line x1="90" y1="140" x2="82" y2="148" stroke="#FFF" stroke-width="2" stroke-linecap="round" />
  <path d="M82 148 L 80 160" stroke="#FFF" stroke-width="1" stroke-dasharray="2 2" />

  <!-- Measuring Tape -->
  <path d="M135 115 Q 125 120, 120 135" stroke="#FDD835" stroke-width="2" fill="none" />
  
  <!-- Scissors -->
  <g transform="translate(40, 162) rotate(-20)">
    <circle cx="0" cy="0" r="5" stroke="#B0BEC5" stroke-width="2" fill="none" />
    <circle cx="10" cy="0" r="5" stroke="#B0BEC5" stroke-width="2" fill="none" />
    <line x1="5" y1="0" x2="18" y2="-12" stroke="#B0BEC5" stroke-width="2" />
    <line x1="5" y1="0" x2="18" y2="12" stroke="#B0BEC5" stroke-width="2" />
  </g>
  
  <!-- Legs -->
  <path d="M132 154 L 130 170 M 142 154 L 144 170" stroke="#3E2723" stroke-width="3" />
</svg>