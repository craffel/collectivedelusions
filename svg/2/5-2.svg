<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#333" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" />
      <feOffset dx="1" dy="1" />
    </filter>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" filter="url(#shadow)" />
  
  <!-- Dress Form -->
  <path d="M70 148 C 70 100, 130 100, 130 148 L 135 180 L 65 180 Z" fill="#EC407A" />
  <circle cx="100" cy="98" r="12" fill="#F8BBD0" />
  <rect x="85" y="148" width="30" height="4" fill="#C2185B" />

  <!-- Crow Body -->
  <ellipse cx="140" cy="130" rx="22" ry="26" fill="url(#feather)" />
  <path d="M120 135 Q 110 160 125 165" fill="#1A1A1A" /> <!-- Tail -->
  
  <!-- Wing (Sewing action) -->
  <path d="M130 125 C 100 115, 80 130, 92 145" stroke="#212121" stroke-width="12" fill="none" stroke-linecap="round" />
  
  <!-- Needle & Thread -->
  <line x1="92" y1="145" x2="85" y2="155" stroke="#CFD8DC" stroke-width="2" stroke-linecap="round" />
  <path d="M92 145 Q 105 135 130 140" stroke="#FFF" stroke-width="1" fill="none" stroke-dasharray="3 3" />
  
  <!-- Head & Eye -->
  <circle cx="145" cy="100" r="18" fill="#121212" />
  <circle cx="152" cy="95" r="2" fill="#FFF" /> <!-- Eye -->
  
  <!-- Glasses -->
  <circle cx="140" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <circle cx="152" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <line x1="145" y1="98" x2="147" y2="98" stroke="#FFD700" stroke-width="1" />
  
  <!-- Beak -->
  <polygon points="160,102 195,108 160,114" fill="#FFC107" />
  
  <!-- Measuring Tape -->
  <path d="M125 108 C 135 105, 145 120, 155 125" stroke="#FDD835" stroke-width="2" fill="none" stroke-dasharray="4 2" />
  
  <!-- Feet -->
  <path d="M135 156 L 132 170 M 145 156 L 148 170" stroke="#4E342E" stroke-width="3" stroke-linecap="round" />
</svg>