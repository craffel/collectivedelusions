<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" filter="url(#shadow)" />
  
  <!-- Dress Form -->
  <g transform="translate(0, 5)">
    <path d="M70 148 C 70 100, 130 100, 130 148 L 135 180 L 65 180 Z" fill="url(#silk)" />
    <ellipse cx="100" cy="100" rx="15" ry="10" fill="#F8BBD0" />
    <rect x="70" y="145" width="60" height="3" fill="#C2185B" />
  </g>

  <!-- Crow Body -->
  <ellipse cx="140" cy="130" rx="22" ry="26" fill="url(#feather)" />
  <!-- Tail Feathers -->
  <path d="M155 150 Q 170 160, 165 175" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round" />
  
  <!-- Wing (Sewing) -->
  <path d="M125 125 C 100 115, 85 130, 100 145" stroke="#333" stroke-width="12" fill="none" stroke-linecap="round" />
  
  <!-- Head & Details -->
  <circle cx="145" cy="100" r="18" fill="#121212" />
  <path d="M135 90 C 135 80, 155 80, 155 90" fill="#121212" /> 
  
  <!-- Glasses -->
  <circle cx="140" cy="98" r="5" stroke="#FFD700" stroke-width="1" fill="none" />
  <circle cx="152" cy="98" r="5" stroke="#FFD700" stroke-width="1" fill="none" />
  <line x1="145" y1="98" x2="147" y2="98" stroke="#FFD700" stroke-width="1" />
  
  <!-- Beak (More stylized) -->
  <path d="M158 102 L 190 108 L 158 114 Z" fill="#FFC107" />
  
  <!-- Measuring Tape -->
  <path d="M130 115 C 110 120, 115 140, 130 145" stroke="#FDD835" stroke-width="2" fill="none" stroke-dasharray="4 2" />
  
  <!-- Needle & Thread -->
  <line x1="100" y1="145" x2="90" y2="158" stroke="#E0E0E0" stroke-width="2" />
  <path d="M90 158 Q 110 150, 130 148" stroke="#FFF" stroke-width="1" fill="none" />

  <!-- Pin Cushion -->
  <circle cx="40" cy="148" r="6" fill="#F44336" />
  <line x1="40" y1="142" x2="42" y2="152" stroke="white" stroke-width="1" />
</svg>