<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#333" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
  </defs>

  <!-- Table -->
  <rect x="15" y="155" width="170" height="6" fill="#3E2723" rx="2" />
  
  <!-- Dress Form -->
  <path d="M70 148 C 70 100, 130 100, 130 148 L 135 180 L 65 180 Z" fill="url(#silk)" />
  <path d="M70 148 C 70 100, 130 100, 130 148" stroke="#FCE4EC" stroke-width="0.5" fill="none" stroke-dasharray="3 2" />
  <ellipse cx="100" cy="100" rx="15" ry="10" fill="#F8BBD0" opacity="0.8" />
  
  <!-- Crow Body -->
  <path d="M120 120 C 120 150, 160 150, 160 120 L 150 90 L 130 90 Z" fill="url(#feather)" />
  
  <!-- Head & Beak -->
  <circle cx="145" cy="95" r="18" fill="#121212" />
  <polygon points="160,95 190,98 160,103" fill="#FFC107" />
  
  <!-- Glasses -->
  <path d="M135 95 A 5 5 0 1 0 145 95 A 5 5 0 1 0 135 95" stroke="#FFD700" stroke-width="1.2" fill="none" />
  <path d="M147 95 A 5 5 0 1 0 157 95 A 5 5 0 1 0 147 95" stroke="#FFD700" stroke-width="1.2" fill="none" />
  <line x1="145" y1="95" x2="147" y2="95" stroke="#FFD700" stroke-width="1" />
  <circle cx="152" cy="93" r="1.5" fill="white" />
  
  <!-- Wing & Sewing Action -->
  <path d="M125 125 C 110 110, 90 120, 85 140" stroke="#424242" stroke-width="10" fill="none" stroke-linecap="round" />
  <line x1="85" y1="140" x2="75" y2="155" stroke="#FF8A80" stroke-width="2" stroke-linecap="round" />
  
  <!-- Measuring Tape -->
  <path d="M140 105 Q 120 110, 115 130" stroke="#FFEB3B" stroke-width="2.5" fill="none" stroke-linecap="round" />
  
  <!-- Scissors -->
  <g transform="translate(40, 165) rotate(-20)">
    <circle cx="0" cy="0" r="5" stroke="#CFD8DC" stroke-width="2" fill="none" />
    <circle cx="10" cy="0" r="5" stroke="#CFD8DC" stroke-width="2" fill="none" />
    <line x1="5" y1="0" x2="15" y2="-10" stroke="#CFD8DC" stroke-width="2" />
    <line x1="5" y1="0" x2="15" y2="10" stroke="#CFD8DC" stroke-width="2" />
  </g>
  
  <!-- Legs -->
  <path d="M135 145 L 132 165 M 145 145 L 148 165" stroke="#3E2723" stroke-width="2" />
</svg>