<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#444" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CFD8DC" />
      <stop offset="100%" stop-color="#78909C" />
    </linearGradient>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" />
  
  <!-- Dress Form -->
  <path d="M75 148 C 75 100, 125 100, 125 148 L 130 180 L 70 180 Z" fill="url(#silk)" />
  <path d="M100 148 L 100 180" stroke="#880E4F" stroke-width="1" opacity="0.3" />
  <ellipse cx="100" cy="100" rx="12" ry="8" fill="#F8BBD0" />
  
  <!-- Crow Body -->
  <ellipse cx="140" cy="135" rx="20" ry="24" fill="url(#feather)" />
  <path d="M130 155 Q 120 170 140 175" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round" />
  
  <!-- Wing -->
  <path d="M125 135 C 105 130, 95 140, 95 150 C 95 155, 100 160, 105 155" fill="#222" />
  
  <!-- Head -->
  <circle cx="145" cy="105" r="16" fill="#121212" />
  <path d="M160 105 L 192 108 L 160 111 Z" fill="#FFC107" />
  
  <!-- Glasses -->
  <circle cx="140" cy="103" r="4.5" stroke="#FFD700" stroke-width="1" fill="none" />
  <circle cx="150" cy="103" r="4.5" stroke="#FFD700" stroke-width="1" fill="none" />
  <line x1="144" y1="103" x2="146" y2="103" stroke="#FFD700" stroke-width="1" />
  
  <!-- Measuring Tape -->
  <path d="M140 120 Q 110 125, 100 150" stroke="#FDD835" stroke-width="2" fill="none" stroke-dasharray="4 3" />
  
  <!-- Scissors -->
  <g transform="translate(45, 165) rotate(-20) scale(0.9)">
    <circle cx="0" cy="0" r="4" stroke="url(#metal)" stroke-width="2" fill="none" />
    <circle cx="8" cy="0" r="4" stroke="url(#metal)" stroke-width="2" fill="none" />
    <path d="M4 0 L 15 -10 M4 0 L 15 10" stroke="url(#metal)" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Pin Cushion -->
  <circle cx="30" cy="146" r="5" fill="#D32F2F" />
  <line x1="30" y1="142" x2="32" y2="135" stroke="silver" stroke-width="1" />
  <line x1="30" y1="141" x2="28" y2="136" stroke="silver" stroke-width="1" />
  
  <!-- Legs -->
  <path d="M135 158 L 133 175 M145 158 L 147 175" stroke="#3E2723" stroke-width="2" />
</svg>