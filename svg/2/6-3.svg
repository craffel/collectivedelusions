<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Table with shadow -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" filter="url(#shadow)" />
  
  <!-- Scissors -->
  <path d="M50 145 C 45 140, 45 140, 48 138 C 50 140, 52 140, 55 138 L 60 145" stroke="#78909C" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Dress Form -->
  <path d="M70 148 C 70 100, 130 100, 130 148 L 135 180 L 65 180 Z" fill="url(#silk)" filter="url(#shadow)" />
  <rect x="70" y="145" width="60" height="3" fill="#C2185B" /> 
  
  <!-- Crow Body & Tail -->
  <path d="M150 140 L 165 160 L 150 150 Z" fill="#000" /> <!-- Tail -->
  <ellipse cx="140" cy="130" rx="22" ry="26" fill="url(#feather)" />
  
  <!-- Measuring Tape -->
  <path d="M128 115 Q 120 125, 125 135" stroke="#FDD835" stroke-width="2" fill="none" stroke-dasharray="4 2" />
  
  <!-- Wing (Sewing) -->
  <path d="M125 125 C 100 115, 85 130, 100 145" stroke="#1A1A1A" stroke-width="12" fill="none" stroke-linecap="round" />
  <line x1="100" y1="145" x2="95" y2="152" stroke="#CFD8DC" stroke-width="2" />
  
  <!-- Head -->
  <circle cx="145" cy="100" r="18" fill="#121212" />
  <circle cx="150" cy="95" r="3" fill="#FFF" /> <!-- Eye -->
  <circle cx="151" cy="95" r="1" fill="#000" />
  
  <!-- Glasses -->
  <circle cx="140" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <circle cx="152" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <line x1="145" y1="98" x2="147" y2="98" stroke="#FFD700" stroke-width="1.5" />
  
  <!-- Beak -->
  <polygon points="160,102 190,108 160,110" fill="#FFC107" stroke="#FFA000" stroke-width="0.5" />
  
  <!-- Legs -->
  <path d="M135 155 L 132 170 M 145 155 L 148 170" stroke="#3E2723" stroke-width="3" stroke-linecap="round" />
</svg>