<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Table with shadow -->
  <rect x="30" y="145" width="140" height="15" fill="#4E342E" rx="2" />
  
  <!-- Mannequin / Dress Form -->
  <path d="M70 145 L90 100 L110 100 L130 145 Z" fill="#F8BBD0" />
  
  <!-- Fabric being stitched -->
  <path d="M60 140 Q 80 120 100 140 T 140 140" fill="#E91E63" stroke="#880E4F" stroke-width="2"/>

  <!-- Crow Tail -->
  <path d="M140 130 L155 150 L145 135 Z" fill="#212121" />

  <!-- Crow Body -->
  <ellipse cx="120" cy="115" rx="25" ry="30" fill="#212121" />
  
  <!-- Crow Wing -->
  <path d="M100 115 Q 70 100 80 85" stroke="#212121" stroke-width="12" stroke-linecap="round" fill="none" />
  
  <!-- Crow Head -->
  <circle cx="125" cy="85" r="18" fill="#212121" />
  
  <!-- Eye -->
  <circle cx="132" cy="80" r="3" fill="white" />
  <circle cx="133" cy="79" r="1" fill="black" />
  
  <!-- Beak -->
  <polygon points="140,85 165,92 140,98" fill="#FFC107" />
  
  <!-- Needle -->
  <line x1="80" y1="85" x2="60" y2="70" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round" />
  
  <!-- Measuring Tape -->
  <path d="M110 120 C 130 150 160 140 175 110" stroke="#FFEB3B" stroke-width="3" fill="none" stroke-linecap="round" />
  
  <!-- Legs -->
  <line x1="115" y1="140" x2="115" y2="160" stroke="#FFC107" stroke-width="2" />
  <line x1="125" y1="140" x2="125" y2="160" stroke="#FFC107" stroke-width="2" />
</svg>