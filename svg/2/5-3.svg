<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </radialGradient>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" />
  <path d="M20 158 L180 158 L175 165 L25 165 Z" fill="#3E2723" />
  
  <!-- Dress Form -->
  <path d="M70 148 C 70 100, 130 100, 130 148 L 135 180 L 65 180 Z" fill="#EC407A" />
  <ellipse cx="100" cy="100" rx="15" ry="10" fill="#F8BBD0" />
  <rect x="85" y="148" width="30" height="4" fill="#C2185B" />
  <path d="M70 148 C 80 152, 120 152, 130 148" fill="#D81B60" opacity="0.5" />

  <!-- Crow Body -->
  <ellipse cx="140" cy="130" rx="22" ry="26" fill="url(#feather)" />
  
  <!-- Wing & Sewing Action -->
  <path d="M125 125 C 100 115, 80 135, 95 145" stroke="#212121" stroke-width="16" fill="none" stroke-linecap="round" />
  <!-- Feather detail on wing -->
  <path d="M98 135 Q 110 120 125 125" stroke="#000" stroke-width="2" fill="none" />
  
  <!-- Needle & Thread -->
  <line x1="95" y1="145" x2="90" y2="155" stroke="#B0BEC5" stroke-width="2" />
  <path d="M95 145 Q 110 130 135 135" stroke="#FFF" stroke-width="1" fill="none" stroke-dasharray="3 3" />
  
  <!-- Head -->
  <circle cx="145" cy="100" r="18" fill="#121212" />
  <circle cx="152" cy="95" r="3" fill="#FFF" /> <!-- Eye -->
  
  <!-- Glasses -->
  <circle cx="140" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <circle cx="152" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <line x1="145" y1="98" x2="147" y2="98" stroke="#FFD700" stroke-width="1" />
  
  <!-- Beak -->
  <polygon points="158,102 190,107 158,110" fill="#FFC107" />
  
  <!-- Measuring Tape -->
  <path d="M140 105 C 145 115, 130 125, 120 120" stroke="#FDD835" stroke-width="3" fill="none" stroke-linecap="round" />
  
  <!-- Legs -->
  <path d="M135 156 L 132 175 M 145 156 L 148 175" stroke="#4E342E" stroke-width="3" stroke-linecap="round" />
</svg>