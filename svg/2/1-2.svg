<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Table -->
  <rect x="30" y="150" width="140" height="8" fill="#5D4037" rx="2" />
  <rect x="40" y="158" width="120" height="40" fill="#3E2723" opacity="0.3" />

  <!-- Mannequin Stand -->
  <line x1="70" y1="150" x2="70" y2="120" stroke="#795548" stroke-width="3" />
  <circle cx="70" cy="115" r="5" fill="#F48FB1" stroke="#880E4F" />

  <!-- Dress on Mannequin -->
  <path d="M55 120 Q 70 150 85 120 Z" fill="#F48FB1" stroke="#880E4F" stroke-width="1" />

  <!-- Crow Body -->
  <ellipse cx="120" cy="115" rx="22" ry="28" fill="#212121" />
  <path d="M105 130 Q 100 150 115 155 Q 105 140 110 130" fill="#212121" />
  
  <!-- Crow Head -->
  <circle cx="120" cy="90" r="18" fill="#212121" />
  
  <!-- Eye -->
  <circle cx="126" cy="85" r="4" fill="white" />
  <circle cx="128" cy="84" r="1.5" fill="black" />
  
  <!-- Beak -->
  <polygon points="135,90 165,95 135,100" fill="#FFC107" />
  
  <!-- Sewing Wing -->
  <path d="M110 105 C 90 95 75 105 70 115" stroke="#212121" stroke-width="10" fill="none" stroke-linecap="round" />
  
  <!-- Needle and Thread -->
  <line x1="70" y1="115" x2="50" y2="105" stroke="#CFD8DC" stroke-width="1.5" />
  <path d="M50 105 Q 60 115 70 120" stroke="#880E4F" stroke-width="1" fill="none" stroke-dasharray="2 1" />
  
  <!-- Measuring Tape -->
  <path d="M130 110 C 150 120 160 140 150 150" stroke="#FFEB3B" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="4 2" />
  
  <!-- Legs -->
  <path d="M112 143 L 110 155 M 128 143 L 130 155" stroke="#FFC107" stroke-width="2" stroke-linecap="round" />
</svg>