<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Table -->
  <rect x="40" y="140" width="120" height="10" fill="#5D4037" />
  
  <!-- Fabric on table -->
  <path d="M60 140 Q 80 120 100 140 T 140 140" fill="#E91E63" stroke="#880E4F" stroke-width="2"/>

  <!-- Crow Body -->
  <ellipse cx="120" cy="110" rx="25" ry="30" fill="#212121" />
  
  <!-- Crow Head -->
  <circle cx="120" cy="80" r="15" fill="#212121" />
  
  <!-- Beak -->
  <polygon points="135,80 155,85 135,90" fill="#FFC107" />
  
  <!-- Eye -->
  <circle cx="125" cy="75" r="2" fill="white" />
  
  <!-- Wing holding needle -->
  <path d="M100 110 Q 80 100 85 85" stroke="#212121" stroke-width="8" fill="none" stroke-linecap="round" />
  
  <!-- Needle -->
  <line x1="85" y1="85" x2="70" y2="70" stroke="#BDBDBD" stroke-width="2" />
  
  <!-- Measuring Tape -->
  <path d="M110 130 C 130 150 160 140 170 120" stroke="#FFEB3B" stroke-width="3" fill="none" stroke-linecap="round" />
  
  <!-- Legs -->
  <line x1="110" y1="140" x2="110" y2="150" stroke="#FFC107" stroke-width="3" />
  <line x1="130" y1="140" x2="130" y2="150" stroke="#FFC107" stroke-width="3" />
</svg>