<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Table Legs/Shadow -->
  <rect x="40" y="150" width="120" height="5" fill="#3E2723" />
  <rect x="50" y="140" width="100" height="10" fill="#795548" />
  
  <!-- Fabric with Dress Detail -->
  <path d="M60 140 Q 80 110 100 140 T 140 140" fill="#F48FB1" stroke="#880E4F" stroke-width="1"/>
  <path d="M80 130 Q 100 115 120 130" fill="none" stroke="#880E4F" stroke-width="1.5" />

  <!-- Crow Body (Feathered effect) -->
  <ellipse cx="120" cy="115" rx="25" ry="30" fill="#212121" />
  
  <!-- Crow Head -->
  <circle cx="120" cy="85" r="18" fill="#212121" />
  
  <!-- Beak -->
  <polygon points="135,85 160,92 135,99" fill="#FFC107" />
  <line x1="135" y1="92" x2="160" y2="92" stroke="#B38B00" stroke-width="0.5" />
  
  <!-- Eye -->
  <circle cx="125" cy="80" r="3" fill="white" />
  <circle cx="126" cy="79" r="1" fill="black" />
  
  <!-- Wing holding needle -->
  <path d="M105 110 C 80 110 70 90 80 80" stroke="#212121" stroke-width="12" fill="none" stroke-linecap="round" />
  
  <!-- Needle -->
  <line x1="80" y1="80" x2="60" y2="60" stroke="#ECEFF1" stroke-width="2" stroke-linecap="round" />
  
  <!-- Measuring Tape -->
  <path d="M100 135 C 130 155 170 145 180 125" stroke="#FFEB3B" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="5 2" />
  
  <!-- Legs -->
  <path d="M110 145 L 105 160 M 130 145 L 135 160" stroke="#FFC107" stroke-width="3" stroke-linecap="round" />
</svg>