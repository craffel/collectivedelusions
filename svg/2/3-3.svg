<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
  </defs>

  <!-- Table Surface -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" />
  
  <!-- Dress Form (with gradient for fabric look) -->
  <defs>
    <linearGradient id="silk" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="50%" stop-color="#D81B60" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
  </defs>
  <path d="M75 150 C 75 125, 125 125, 125 150 L 135 185 L 65 185 Z" fill="url(#silk)" />
  <circle cx="100" cy="115" r="8" fill="#F8BBD0" stroke="#880E4F" stroke-width="2" />

  <!-- Crow Body -->
  <ellipse cx="110" cy="120" rx="20" ry="22" fill="url(#feather)" />
  
  <!-- Head -->
  <circle cx="115" cy="90" r="14" fill="#121212" />
  
  <!-- Beak -->
  <polygon points="128,90 155,94 128,98" fill="#FFC107" />
  
  <!-- Eye -->
  <circle cx="120" cy="86" r="3.5" fill="white" />
  <circle cx="122" cy="85" r="1.5" fill="black" />
  
  <!-- Wing & Needle -->
  <path d="M100 115 C 80 110, 75 90, 85 85" stroke="#333" stroke-width="12" fill="none" stroke-linecap="round" />
  <circle cx="85" cy="85" r="3" fill="#B0BEC5" /> <!-- Thimble -->
  <line x1="85" y1="85" x2="70" y2="78" stroke="#CFD8DC" stroke-width="2" />
  
  <!-- Thread -->
  <path d="M70 78 Q 85 100 95 130" stroke="white" stroke-width="1" fill="none" stroke-dasharray="3 2" />
  
  <!-- Measuring Tape -->
  <path d="M85 140 Q 110 150 140 135" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="4 3" />
  
  <!-- Feet -->
  <path d="M105 142 L 102 155 M 115 142 L 118 155" stroke="#FFC107" stroke-width="2" stroke-linecap="round" />
</svg>