<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#444" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
  </defs>

  <!-- Table -->
  <rect x="20" y="160" width="160" height="5" fill="#5D4037" />
  
  <!-- Dress Form (Enhanced Draping) -->
  <path d="M75 160 L 70 140 Q 100 135 130 140 L 125 160 Z" fill="url(#silk)" />
  <circle cx="100" cy="138" r="8" fill="#F8BBD0" /> <!-- Mannequin neck -->
  
  <!-- Crow Body (More Dynamic) -->
  <ellipse cx="145" cy="140" rx="20" ry="25" fill="url(#feather)" />
  
  <!-- Wing/Arm -->
  <path d="M130 135 C 110 130, 95 135, 90 145" stroke="#333" stroke-width="8" stroke-linecap="round" fill="none" />
  
  <!-- Head -->
  <circle cx="150" cy="115" r="16" fill="#121212" />
  <!-- Eye with monocle effect -->
  <circle cx="158" cy="112" r="6" stroke="#FFD700" stroke-width="1" fill="none" />
  <circle cx="158" cy="112" r="2" fill="white" />
  <circle cx="159" cy="112" r="0.8" fill="black" />
  
  <!-- Beak -->
  <path d="M165 115 L 185 118 L 165 122 Z" fill="#FFC107" />
  
  <!-- Sewing/Pinning detail -->
  <circle cx="90" cy="145" r="2" fill="#E0E0E0" />
  <line x1="90" y1="145" x2="90" y2="155" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="2 1" />

  <!-- Measuring Tape -->
  <path d="M140 130 Q 130 145, 115 150" stroke="#FDD835" stroke-width="2" fill="none" stroke-linecap="round" />
  
  <!-- Scissors (Refined) -->
  <g transform="translate(45, 175) rotate(-10) scale(0.8)">
    <circle cx="0" cy="0" r="6" stroke="#CFD8DC" stroke-width="2" fill="none" />
    <circle cx="12" cy="0" r="6" stroke="#CFD8DC" stroke-width="2" fill="none" />
    <line x1="6" y1="0" x2="20" y2="-15" stroke="#CFD8DC" stroke-width="2" stroke-linecap="round" />
    <line x1="6" y1="0" x2="20" y2="15" stroke="#CFD8DC" stroke-width="2" stroke-linecap="round" />
  </g>
  
  <!-- Legs -->
  <path d="M140 165 L 138 175 M 150 165 L 152 175" stroke="#3E2723" stroke-width="2" />
</svg>