<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#121212" />
    </radialGradient>
  </defs>

  <!-- Table Surface -->
  <rect x="20" y="160" width="160" height="8" fill="#5D4037" rx="2" />
  
  <!-- Dress Form -->
  <path d="M80 160 L 120 160 L 130 190 L 70 190 Z" fill="#EC407A" />
  <ellipse cx="100" cy="155" rx="15" ry="5" fill="#C2185B" /> <!-- Waistband -->
  <circle cx="100" cy="130" r="12" fill="#F8BBD0" stroke="#880E4F" stroke-width="1" />
  <rect x="98" y="142" width="4" height="15" fill="#795548" /> <!-- Stand -->

  <!-- Crow Body & Feathers -->
  <ellipse cx="130" cy="120" rx="20" ry="22" fill="url(#feather)" />
  <path d="M120 105 Q 110 110 115 125" stroke="#121212" stroke-width="3" fill="none" />
  
  <!-- Wing (Holding needle) -->
  <path d="M115 120 C 90 110 80 100 95 90" stroke="#212121" stroke-width="12" fill="none" stroke-linecap="round" />
  
  <!-- Needle & Thread -->
  <line x1="95" y1="90" x2="75" y2="80" stroke="#B0BEC5" stroke-width="2" stroke-linecap="round"/>
  <path d="M75 80 Q 80 120 90 140" stroke="#FFF" stroke-width="1" fill="none" stroke-dasharray="2 2" />
  
  <!-- Head -->
  <circle cx="135" cy="95" r="14" fill="#121212" />
  
  <!-- Beak -->
  <polygon points="145,95 175,100 145,105" fill="#FFC107" />
  <line x1="145" y1="100" x2="175" y2="100" stroke="#FFA000" stroke-width="0.5" />
  
  <!-- Eye -->
  <circle cx="138" cy="90" r="4" fill="white" />
  <circle cx="139" cy="89" r="1.5" fill="black" />
  <circle cx="141" cy="88" r="0.5" fill="white" /> 

  <!-- Measuring Tape -->
  <path d="M80 160 Q 120 180 160 155" stroke="#FFD700" stroke-width="3" fill="none" stroke-dasharray="4 3" />
  
  <!-- Legs (Perched on table) -->
  <path d="M125 142 L 122 160 M 135 142 L 138 160" stroke="#FFB300" stroke-width="2" stroke-linecap="round" />
</svg>