<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#444" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" />
  
  <!-- Dress Form with Pleats -->
  <path d="M70 148 C 70 100, 130 100, 130 148 L 135 180 L 65 180 Z" fill="url(#silk)" />
  <path d="M85 148 L 85 180 M100 148 L 100 180 M115 148 L 115 180" stroke="#880E4F" stroke-width="0.5" opacity="0.5" />
  <ellipse cx="100" cy="100" rx="15" ry="10" fill="#F8BBD0" />
  
  <!-- Crow Body -->
  <ellipse cx="140" cy="130" rx="22" ry="26" fill="url(#feather)" />
  
  <!-- Wing (Arm) -->
  <path d="M125 130 C 110 125, 95 135, 95 145" stroke="#222" stroke-width="10" fill="none" stroke-linecap="round" />
  
  <!-- Head & Beak -->
  <circle cx="145" cy="100" r="18" fill="#121212" />
  <path d="M160 100 L 195 105 L 160 110 Z" fill="#FFC107" />
  
  <!-- Glasses -->
  <circle cx="140" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <circle cx="152" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <path d="M145 98 L 147 98" stroke="#FFD700" stroke-width="1" />
  <circle cx="153" cy="97" r="1.5" fill="white" />
  
  <!-- Measuring Tape (Draped over shoulder) -->
  <path d="M140 115 Q 120 120, 115 140" stroke="#FDD835" stroke-width="2" fill="none" stroke-dasharray="4 2" />
  
  <!-- Scissors on Table -->
  <g transform="translate(45, 165) rotate(-30) scale(0.8)">
    <circle cx="0" cy="0" r="5" stroke="#B0BEC5" stroke-width="2" fill="none" />
    <circle cx="10" cy="0" r="5" stroke="#B0BEC5" stroke-width="2" fill="none" />
    <path d="M5 0 L 18 -12 M5 0 L 18 12" stroke="#B0BEC5" stroke-width="2" />
  </g>

  <!-- Pin Cushion -->
  <circle cx="25" cy="145" r="6" fill="#D32F2F" />
  <circle cx="25" cy="145" r="1" fill="#FFF" />
  
  <!-- Legs -->
  <path d="M132 154 L 130 170 M142 154 L 144 170" stroke="#3E2723" stroke-width="3" />
</svg>