<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#444" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F48FB1" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
  </defs>

  <!-- Table -->
  <rect x="10" y="155" width="180" height="10" fill="#5D4037" rx="2" />
  
  <!-- Dress Form -->
  <g id="mannequin">
    <path d="M75 155 C 75 110, 125 110, 125 155 L 130 185 L 70 185 Z" fill="url(#silk)" />
    <path d="M75 155 C 75 150, 125 150, 125 155" fill="#AD1457" /> <!-- Waist seam -->
    <ellipse cx="100" cy="105" rx="12" ry="8" fill="#F8BBD0" stroke="#880E4F" stroke-width="0.5" />
  </g>
  
  <!-- Crow -->
  <g id="crow">
    <!-- Wing/Arm -->
    <path d="M140 135 C 120 130, 100 135, 95 145" stroke="#333" stroke-width="6" fill="none" stroke-linecap="round" />
    
    <!-- Body -->
    <ellipse cx="145" cy="135" rx="20" ry="25" fill="url(#feather)" />
    
    <!-- Head -->
    <circle cx="150" cy="105" r="16" fill="#1a1a1a" />
    
    <!-- Glasses -->
    <rect x="142" y="98" width="7" height="6" rx="1" stroke="#FFD700" fill="none" stroke-width="1"/>
    <rect x="151" y="98" width="7" height="6" rx="1" stroke="#FFD700" fill="none" stroke-width="1"/>
    <line x1="149" y1="101" x2="151" y2="101" stroke="#FFD700" stroke-width="1" />
    
    <!-- Beak -->
    <path d="M162 105 L 185 110 L 162 115 Z" fill="#FFC107" />
    
    <!-- Needle/Thread -->
    <line x1="95" y1="145" x2="90" y2="150" stroke="#ccc" stroke-width="1" />
    <path d="M90 150 Q 85 140 80 130" stroke="#FFF" stroke-width="1" fill="none" stroke-dasharray="2 2" />
  </g>
  
  <!-- Spool of thread -->
  <rect x="160" y="145" width="10" height="12" fill="#E91E63" rx="1" />
  <circle cx="165" cy="145" r="5" fill="#D81B60" />
  
  <!-- Scissors -->
  <g transform="translate(40, 170) rotate(-10) scale(0.8)">
    <circle cx="0" cy="0" r="6" stroke="#90A4AE" stroke-width="2" fill="none" />
    <circle cx="12" cy="0" r="6" stroke="#90A4AE" stroke-width="2" fill="none" />
    <path d="M6 0 L 25 -15 M 6 0 L 25 15" stroke="#90A4AE" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>