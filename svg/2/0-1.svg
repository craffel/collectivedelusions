<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Table -->
  <rect x="30" y="140" width="140" height="10" fill="#4E342E" />
  <rect x="35" y="150" width="130" height="5" fill="#3E2723" />
  
  <!-- Fabric/Dress Shape -->
  <path d="M60 140 C 60 100, 100 100, 100 140" fill="#E91E63" stroke="#880E4F" stroke-width="1"/>

  <!-- Crow Body Group -->
  <g id="crow">
    <!-- Tail -->
    <path d="M100 135 L90 160 L110 140" fill="#212121" />
    
    <!-- Body -->
    <ellipse cx="115" cy="115" rx="20" ry="25" fill="#212121" />
    
    <!-- Head -->
    <circle cx="115" cy="85" r="15" fill="#212121" />
    
    <!-- Eye -->
    <circle cx="120" cy="80" r="2.5" fill="white" />
    
    <!-- Beak -->
    <polygon points="130,85 155,90 130,95" fill="#FFC107" />
    
    <!-- Wing holding needle -->
    <path d="M100 110 Q 80 100 85 85" stroke="#212121" stroke-width="8" fill="none" stroke-linecap="round" />
  </g>
  
  <!-- Needle and Thread -->
  <line x1="85" y1="85" x2="70" y2="70" stroke="#BDBDBD" stroke-width="2" />
  <path d="M70 70 Q 75 90 95 110" stroke="#FFF" stroke-width="0.5" fill="none" stroke-dasharray="2 2"/>
  
  <!-- Measuring Tape -->
  <path d="M105 120 C 130 110 160 130 165 140" stroke="#FFEB3B" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Legs -->
  <path d="M105 140 L105 160 M125 140 L125 160" stroke="#FFC107" stroke-width="2" stroke-linecap="round" />
</svg>