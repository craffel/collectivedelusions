<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="featherGrad">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </radialGradient>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" />
  
  <!-- Pincushion -->
  <circle cx="35" cy="148" r="8" fill="#D32F2F" />
  
  <!-- Dress Form -->
  <path d="M75 150 C 75 110, 125 110, 125 150 L 135 185 L 65 185 Z" fill="#EC407A" />
  <path d="M75 150 C 75 130, 125 130, 125 150" stroke="#C2185B" stroke-width="1" fill="none" />
  <ellipse cx="100" cy="110" rx="10" ry="6" fill="#F8BBD0" />
  
  <!-- Crow Body -->
  <ellipse cx="140" cy="130" rx="26" ry="30" fill="url(#featherGrad)" />
  <!-- Wing -->
  <path d="M125 125 C 100 115, 80 130, 95 145" stroke="#333" stroke-width="10" stroke-linecap="round" fill="none" />
  
  <!-- Head -->
  <circle cx="145" cy="100" r="18" fill="#121212" />
  
  <!-- Eye -->
  <circle cx="150" cy="95" r="4" fill="#FFF" />
  <circle cx="152" cy="94" r="1.5" fill="#000" />
  
  <!-- Beak -->
  <polygon points="160,100 195,105 160,112" fill="#FFC107" />
  
  <!-- Needle & Thread (Seaming the dress) -->
  <line x1="95" y1="145" x2="85" y2="155" stroke="#CFD8DC" stroke-width="1.5" />
  <path d="M95 145 Q 110 130 130 140" stroke="#FFF" stroke-width="1" fill="none" stroke-dasharray="2 3" />
  
  <!-- Measuring Tape -->
  <path d="M120 105 Q 130 120 150 120" stroke="#FFD700" stroke-width="1.5" fill="none" stroke-dasharray="2 2" />
  
  <!-- Legs -->
  <path d="M135 160 L 132 175 M 145 160 L 148 175" stroke="#FBC02D" stroke-width="2" stroke-linecap="round" />
  
  <!-- Feather detail on chest -->
  <path d="M130 135 L 125 145 M 135 140 L 132 150" stroke="#000" stroke-width="1" opacity="0.3" />
</svg>