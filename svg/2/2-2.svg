<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="featherGradient">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
  </defs>

  <!-- Table Surface -->
  <rect x="20" y="150" width="160" height="10" fill="#3E2723" rx="2" />
  
  <!-- Dress Form (Mannequin) -->
  <path d="M70 150 L 90 90 L 110 150 Z" fill="#F48FB1" stroke="#880E4F" stroke-width="1" />
  <ellipse cx="90" cy="90" rx="8" ry="4" fill="#EC407A" />

  <!-- Crow Body -->
  <ellipse cx="130" cy="120" rx="22" ry="30" fill="url(#featherGradient)" />
  
  <!-- Head & Eye -->
  <circle cx="130" cy="90" r="18" fill="#000" />
  <circle cx="138" cy="85" r="3" fill="#FFF" />
  <circle cx="139" cy="84" r="1.5" fill="#000" />
  
  <!-- Beak -->
  <polygon points="145,90 175,93 145,96" fill="#FFC107" />
  
  <!-- Wing & Needle -->
  <path d="M115 110 C 100 100 80 90 85 80" stroke="#1A1A1A" stroke-width="10" fill="none" stroke-linecap="round" />
  <line x1="85" y1="80" x2="65" y2="60" stroke="#CFD8DC" stroke-width="2" stroke-linecap="round" />
  
  <!-- Thread -->
  <path d="M65 60 Q 50 100 80 120" stroke="#FFF" stroke-width="1.5" fill="none" stroke-dasharray="3 3" />
  
  <!-- Measuring Tape -->
  <path d="M80 140 C 100 170 160 160 175 145" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="4 2" />
  
  <!-- Crow Legs -->
  <path d="M125 150 L 120 170 M 135 150 L 140 170" stroke="#FBC02D" stroke-width="3" stroke-linecap="round" />
</svg>