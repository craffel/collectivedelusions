<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#555" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC407A" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" />
  
  <!-- Dress Form -->
  <path d="M70 148 C 70 100, 130 100, 130 148 L 135 180 L 65 180 Z" fill="url(#silk)" />
  <path d="M85 148 L 85 180 M100 148 L 100 180 M115 148 L 115 180" stroke="#AD1457" stroke-width="0.5" />
  
  <!-- Crow Body and Tail -->
  <path d="M150 140 C 130 140, 125 120, 135 115 C 140 105, 160 110, 150 140 Z" fill="url(#feather)" />
  <path d="M160 145 Q 175 160, 170 175" stroke="#000" stroke-width="6" fill="none" stroke-linecap="round" />
  
  <!-- Head & Beak -->
  <circle cx="145" cy="100" r="18" fill="#1A1A1A" />
  <path d="M160 100 L 195 105 L 160 110 Z" fill="#FFC107" />
  
  <!-- Glasses -->
  <circle cx="140" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <circle cx="152" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <path d="M145 98 L 147 98" stroke="#FFD700" stroke-width="1" />
  
  <!-- Wing (Arm) -->
  <path d="M135 125 C 115 120, 100 135, 105 145" stroke="#333" stroke-width="12" fill="none" stroke-linecap="round" />
  <!-- Needle in Wing tip -->
  <line x1="105" y1="145" x2="100" y2="135" stroke="#EEE" stroke-width="1" />

  <!-- Measuring Tape -->
  <path d="M140 115 Q 120 120, 115 140" stroke="#FDD835" stroke-width="2" fill="none" stroke-dasharray="2 3" />
  
  <!-- Scissors on Table -->
  <g transform="translate(45, 165) rotate(-30) scale(0.8)">
    <ellipse cx="0" cy="0" rx="6" ry="5" stroke="#B0BEC5" stroke-width="2" fill="none" />
    <ellipse cx="10" cy="0" rx="6" ry="5" stroke="#B0BEC5" stroke-width="2" fill="none" />
    <path d="M5 0 L 20 -15 M5 0 L 20 15" stroke="#B0BEC5" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Pin Cushion -->
  <circle cx="25" cy="145" r="7" fill="#D32F2F" />
  <line x1="25" y1="140" x2="25" y2="130" stroke="#FFF" stroke-width="1" />
  <line x1="20" y1="142" x2="15" y2="135" stroke="#FFF" stroke-width="1" />
  
  <!-- Legs -->
  <path d="M135 154 L 133 175 M145 154 L 147 175" stroke="#3E2723" stroke-width="2" />
</svg>