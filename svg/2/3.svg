<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#121212" />
    </radialGradient>
  </defs>

  <!-- Table Surface -->
  <rect x="20" y="145" width="160" height="10" fill="#3E2723" rx="2" />
  
  <!-- Dress Form -->
  <path d="M70 145 C 70 120, 130 120, 130 145 L 140 180 L 60 180 Z" fill="#EC407A" />
  <circle cx="100" cy="115" r="10" fill="#F8BBD0" stroke="#880E4F" stroke-width="1" />

  <!-- Crow Body -->
  <ellipse cx="120" cy="125" rx="22" ry="25" fill="url(#feather)" />
  
  <!-- Wing (Holding needle) -->
  <path d="M110 120 C 80 115, 70 95, 85 85" stroke="#212121" stroke-width="14" fill="none" stroke-linecap="round" />
  
  <!-- Needle & Thread -->
  <line x1="85" y1="85" x2="65" y2="75" stroke="#CFD8DC" stroke-width="2" />
  <path d="M65 75 Q 70 100 80 120" stroke="#FFF" stroke-width="1" fill="none" stroke-dasharray="2 2" />
  
  <!-- Head -->
  <circle cx="125" cy="95" r="16" fill="#121212" />
  
  <!-- Beak -->
  <polygon points="140,95 170,98 140,102" fill="#FFC107" />
  
  <!-- Eye -->
  <circle cx="130" cy="90" r="4" fill="white" />
  <circle cx="132" cy="89" r="2" fill="black" />
  <circle cx="133" cy="88" r="0.5" fill="white" /> <!-- Glint -->

  <!-- Measuring Tape -->
  <path d="M80 145 Q 120 160 160 140" stroke="#FFD700" stroke-width="3" fill="none" stroke-dasharray="4 2" />
  
  <!-- Legs -->
  <path d="M115 145 L 112 160 M 125 145 L 128 160" stroke="#FBC02D" stroke-width="2" />
</svg>