<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
  </defs>

  <!-- Table -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" />
  
  <!-- Dress Form (More elegant shape) -->
  <path d="M75 150 C 75 110, 125 110, 125 150 L 135 185 L 65 185 Z" fill="#EC407A" />
  <ellipse cx="100" cy="110" rx="12" ry="8" fill="#F8BBD0" />
  
  <!-- Crow Body -->
  <ellipse cx="140" cy="130" rx="25" ry="28" fill="url(#feather)" />
  
  <!-- Wing (Reaching to work on the dress) -->
  <path d="M125 125 C 100 115, 80 135, 95 145" stroke="#212121" stroke-width="12" fill="none" stroke-linecap="round" />
  
  <!-- Needle & Thread -->
  <line x1="95" y1="145" x2="85" y2="155" stroke="#CFD8DC" stroke-width="2" />
  <path d="M95 145 Q 110 130 130 140" stroke="#FFF" stroke-width="1.5" fill="none" stroke-dasharray="2 2" />
  
  <!-- Head -->
  <circle cx="145" cy="100" r="18" fill="#121212" />
  
  <!-- Beak (More focused angle) -->
  <polygon points="160,100 195,108 160,114" fill="#FFC107" />
  
  <!-- Eye -->
  <circle cx="150" cy="95" r="4" fill="white" />
  <circle cx="152" cy="94" r="2" fill="black" />
  
  <!-- Measuring Tape (Draped over the crow's shoulder) -->
  <path d="M120 105 Q 130 120 150 120" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="3 3" />
  
  <!-- Legs -->
  <path d="M135 155 L 132 170 M 145 155 L 148 170" stroke="#FBC02D" stroke-width="2.5" stroke-linecap="round" />
</svg>