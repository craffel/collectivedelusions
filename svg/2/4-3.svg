<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </radialGradient>
  </defs>

  <!-- Table -->
  <rect x="20" y="155" width="160" height="6" fill="#4E342E" rx="2" />
  
  <!-- Dress Form -->
  <path d="M75 155 C 75 115, 125 115, 125 155 L 135 185 L 65 185 Z" fill="#D81B60" />
  <path d="M75 155 L 125 155" stroke="#AD1457" stroke-width="2" /> <!-- Waist seam -->
  <ellipse cx="100" cy="115" rx="10" ry="6" fill="#F06292" />
  
  <!-- Crow Body -->
  <path d="M120 120 C 120 100, 160 100, 170 130 C 170 160, 130 160, 120 140 Z" fill="url(#feather)" />
  
  <!-- Head -->
  <circle cx="155" cy="100" r="16" fill="#121212" />
  
  <!-- Beak -->
  <polygon points="168,100 200,105 168,110" fill="#FFB300" />
  
  <!-- Eye -->
  <circle cx="160" cy="95" r="3" fill="white" />
  <circle cx="161" cy="94" r="1.5" fill="black" />
  
  <!-- Wing (Crafting) -->
  <path d="M130 125 C 100 115, 80 140, 95 150" stroke="#333" stroke-width="8" fill="none" stroke-linecap="round" />
  
  <!-- Needle & Thread -->
  <line x1="95" y1="150" x2="80" y2="160" stroke="#B0BEC5" stroke-width="1.5" />
  <path d="M95 150 Q 110 135 125 145" stroke="#FFFFFF" stroke-width="1" fill="none" stroke-dasharray="2 2" />
  
  <!-- Measuring Tape -->
  <path d="M135 110 Q 145 125 160 125" stroke="#FBC02D" stroke-width="1.5" fill="none" stroke-dasharray="4 2" />
  
  <!-- Legs -->
  <g stroke="#BF360C" stroke-width="2" stroke-linecap="round">
    <path d="M135 155 L 132 175" />
    <path d="M145 155 L 148 175" />
  </g>
</svg>