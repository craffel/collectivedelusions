<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Table Surface -->
  <rect x="30" y="145" width="140" height="15" fill="#5D4037" rx="2" />
  
  <!-- Dress Form / Fabric -->
  <path d="M60 145 Q 80 100 100 145 Q 120 120 140 145" fill="#EC407A" stroke="#880E4F" stroke-width="2" />
  <circle cx="100" cy="100" r="8" fill="#F8BBD0" /> <!-- Dress top -->

  <!-- Crow Body (with gradient) -->
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#121212" />
    </radialGradient>
  </defs>
  
  <ellipse cx="120" cy="115" rx="25" ry="30" fill="url(#feather)" />
  
  <!-- Head & Tuft -->
  <circle cx="120" cy="85" r="18" fill="#121212" />
  <path d="M110 70 Q 115 60 120 70" stroke="#121212" stroke-width="3" fill="none" />
  
  <!-- Beak -->
  <polygon points="135,85 165,88 135,92" fill="#FFC107" />
  
  <!-- Eye -->
  <circle cx="125" cy="80" r="3" fill="white" />
  <circle cx="126" cy="79" r="1.5" fill="black" />
  
  <!-- Wing & Needle -->
  <path d="M105 110 C 80 110 70 90 80 80" stroke="#212121" stroke-width="12" fill="none" stroke-linecap="round" />
  <line x1="80" y1="80" x2="60" y2="60" stroke="#B0BEC5" stroke-width="2" stroke-linecap="round" />
  <!-- Thread -->
  <path d="M60 60 Q 50 80 70 120" stroke="#FFF" stroke-width="1" fill="none" stroke-dasharray="2 2" />
  
  <!-- Measuring Tape -->
  <path d="M90 145 C 130 165 170 155 180 135" stroke="#FFD700" stroke-width="3" fill="none" stroke-dasharray="6 3" />
  
  <!-- Crow Legs -->
  <path d="M115 145 L 110 160 M 125 145 L 130 160" stroke="#FBC02D" stroke-width="3" stroke-linecap="round" />
</svg>