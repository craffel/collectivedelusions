<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="feather">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>
  </defs>

  <!-- Table with improved perspective -->
  <rect x="20" y="150" width="160" height="8" fill="#5D4037" rx="2" />
  <rect x="30" y="158" width="140" height="4" fill="#3E2723" />
  
  <!-- Dress Form (Refined shape) -->
  <path d="M70 148 C 70 100, 130 100, 130 148 L 135 180 L 65 180 Z" fill="#EC407A" />
  <ellipse cx="100" cy="100" rx="15" ry="10" fill="#F8BBD0" />
  <rect x="85" y="148" width="30" height="4" fill="#C2185B" /> <!-- Waist band -->
  
  <!-- Crow Body (More organic) -->
  <ellipse cx="140" cy="130" rx="22" ry="26" fill="url(#feather)" />
  
  <!-- Wing (Reaching to sew) -->
  <path d="M125 125 C 100 115, 85 130, 95 142" stroke="#1A1A1A" stroke-width="14" fill="none" stroke-linecap="round" />
  
  <!-- Needle & Thread -->
  <line x1="95" y1="142" x2="88" y2="152" stroke="#ECEFF1" stroke-width="2" stroke-linecap="round" />
  <path d="M95 142 Q 110 130 135 135" stroke="#FFF" stroke-width="1.5" fill="none" stroke-dasharray="2 2" />
  
  <!-- Head -->
  <circle cx="145" cy="100" r="18" fill="#121212" />
  
  <!-- Glasses -->
  <circle cx="140" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <circle cx="152" cy="98" r="5" stroke="#FFD700" stroke-width="1.5" fill="none" />
  <line x1="145" y1="98" x2="147" y2="98" stroke="#FFD700" stroke-width="1" />
  
  <!-- Beak -->
  <polygon points="160,102 195,108 160,112" fill="#FFC107" />
  
  <!-- Measuring Tape -->
  <path d="M122 105 C 135 105, 140 120, 150 125" stroke="#FDD835" stroke-width="2.5" fill="none" stroke-dasharray="4 2" />
  
  <!-- Legs -->
  <path d="M135 156 L 132 175 M 145 156 L 148 175" stroke="#795548" stroke-width="3" stroke-linecap="round" />
</svg>