<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <defs>
    <!-- Background Pattern -->
    <pattern id="wallpaper" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#2D1115"/>
      <path d="M 40 0 L 40 80" stroke="#3A171C" stroke-width="15"/>
      <path d="M 40 0 L 40 80" stroke="#1A0A0C" stroke-width="2" opacity="0.5"/>
    </pattern>

    <!-- Gradients -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="30%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
    </radialGradient>
    
    <radialGradient id="tableGlow" cx="50%" cy="850" r="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="70%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#0A2A0D"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="3" dy="6" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="lightShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Poker Chip Component -->
    <g id="chip">
      <ellipse cx="0" cy="0" rx="35" ry="14" fill="#111"/>
      <ellipse cx="0" cy="-4" rx="35" ry="14" fill="currentColor"/>
      <path d="M -22 -4 L -32 -4 M 22 -4 L 32 -4 M 0 -13 L 0 -18 M 0 5 L 0 10 M -15 -11 L -22 -15 M 15 -11 L 22 -15 M -15 3 L -22 7 M 15 3 L 22 7" stroke="#FFF" stroke-width="3" opacity="0.9"/>
      <ellipse cx="0" cy="-4" rx="20" ry="7" fill="#FFF" opacity="0.15"/>
      <ellipse cx="0" cy="-4" rx="14" ry="5" fill="#111" opacity="0.3"/>
    </g>

    <!-- Hand Card Component -->
    <g id="card-bg">
      <rect x="0" y="0" width="70" height="110" rx="6" fill="#FFF" stroke="#CCC" stroke-width="1" filter="url(#shadow)"/>
    </g>

    <!-- Table Flop Card Component -->
    <g id="flop-card-bg">
      <rect width="60" height="90" rx="4" fill="#FFF" stroke="#AAA" stroke-width="1"/>
    </g>
  </defs>

  <!-- ================= BACKGROUND ================= -->
  <rect width="1000" height="800" fill="url(#wallpaper)"/>
  
  <!-- Smoky Atmosphere Back -->
  <path d="M 100 200 Q 300 100 500 300 T 900 200" fill="none" stroke="#FFF" stroke-width="60" opacity="0.03" filter="url(#blur)"/>
  <path d="M -100 500 Q 200 400 400 600 T 1100 500" fill="none" stroke="#FFF" stroke-width="80" opacity="0.02" filter="url(#blur)"/>

  <!-- ================= HYENA CHARACTER (BACK LAYER) ================= -->
  <!-- Shoulders & Torso -->
  <path d="M 320 850 C 250 550, 380 430, 500 430 C 620 430, 750 550, 680 850 Z" fill="#9C8171"/>
  <path d="M 380 850 C 380 620, 440 550, 500 550 C 560 550, 620 620, 620 850 Z" fill="#D2C3B9"/>
  
  <!-- Back Mane / Mohawk -->
  <g fill="#211A16">
    <path d="M 450 250 L 400 L 460 200 L 430 130 L 480 180 L 490 100 L 520 170 L 560 110 L 540 190 L 590 150 L 560 220 L 610 200 L 550 260 Z" filter="url(#lightShadow)"/>
    <!-- Mane highlights -->
    <path d="M 470 240 L 430 160 L 480 200 L 500 130 L 520 190 L 550 140 L 540 210 L 580 180 L 550 240 Z" fill="#3E3029"/>
  </g>

  <!-- Left Ear -->
  <path d="M 390 320 C 330 200, 250 230, 300 360 C 320 400, 360 380, 390 320 Z" fill="#9C8171" stroke="#211A16" stroke-width="3"/>
  <path d="M 370 320 C 320 230, 275 255, 315 350 Z" fill="#C49F8C"/>
  <!-- Right Ear (Torn slightly) -->
  <path d="M 610 320 C 670 200, 750 230, 700 360 C 680 400, 640 380, 610 320 Z" fill="#9C8171" stroke="#211A16" stroke-width="3"/>
  <path d="M 630 320 C 680 230, 725 255, 685 350 Z" fill="#C49F8C"/>
  <path d="M 725 290 L 690 300 L 710 320 Z" fill="url(#wallpaper)"/> <!-- Ear tear cutting through -->

  <!-- Base Head Shape -->
  <ellipse cx="500" cy="370" rx="140" ry="110" fill="#9C8171"/>
  
  <!-- Cheeks/Jowls (Wide Hyena Face) -->
  <path d="M 350 390 C 300 480, 420 530, 500 530 C 580 530, 700 480, 650 390 Z" fill="#9C8171"/>

  <!-- Fur Spots -->
  <g fill="#3A251E" opacity="0.85">
    <ellipse cx="360" cy="680" rx="18" ry="25" transform="rotate(-15, 360, 680)"/>
    <ellipse cx="400" cy="740" rx="22" ry="15" transform="rotate(5, 400, 740)"/>
    <ellipse cx="640" cy="690" rx="16" ry="28" transform="rotate(25, 640, 690)"/>
    <ellipse cx="600" cy="760" rx="25" ry="18" transform="rotate(-10, 600, 760)"/>
    <ellipse cx="380" cy="480" rx="12" ry="18" transform="rotate(-20, 380, 480)"/>
    <ellipse cx="340" cy="530" rx="15" ry="10" transform="rotate(-40, 340, 530)"/>
    <ellipse cx="620" cy="490" rx="14" ry="20" transform="rotate(30, 620, 490)"/>
    <ellipse cx="660" cy="540" rx="12" ry="15" transform="rotate(45, 660, 540)"/>
    <circle cx="430" cy="310" r="10"/>
    <circle cx="570" cy="300" r="12"/>
    <circle cx="590" cy="350" r="8"/>
    <circle cx="400" cy="360" r="9"/>
  </g>

  <!-- Muzzle/Snout -->
  <path d="M 430 380 C 400 480, 450 510, 500 510 C 550 510, 600 480, 570 380 C 530 390, 470 390, 430 380 Z" fill="#D2C3B9"/>
  
  <!-- The Big Crazy Grin -->
  <path d="M 370 430 Q 500 580 630 430" fill="none" stroke="#1A110D" stroke-width="10" stroke-linecap="round"/>
  <!-- Lips/Depth -->
  <path d="M 375 435 Q 500 550 625 435 Q 500 590 375 435" fill="#4A2B20"/>

  <!-- Sharp Teeth -->
  <g fill="#FFF" stroke="#1A110D" stroke-width="1.5">
    <!-- Top Row -->
    <polygon points="380,442 395,465 405,452"/>
    <polygon points="410,455 425,480 440,465"/>
    <polygon points="445,468 460,495 475,475"/>
    <polygon points="480,478 500,505 520,478"/>
    <polygon points="525,475 540,495 555,468"/>
    <polygon points="560,465 575,480 590,455"/>
    <polygon points="595,452 605,465 620,442"/>
    <!-- Bottom Row (overlapping the lip slightly) -->
    <polygon points="420,490 430,475 440,495"/>
    <polygon points="450,500 465,480 480,505"/>
    <polygon points="490,510 500,490 510,510"/>
    <polygon points="520,505 535,480 550,500"/>
    <polygon points="560,495 570,475 580,490"/>
  </g>

  <!-- Nose -->
  <path d="M 460 410 C 460 385, 540 385, 540 410 L 515 445 Q 500 455 485 445 Z" fill="#1A110D"/>
  <ellipse cx="485" cy="405" rx="10" ry="4" fill="#FFF" opacity="0.3" transform="rotate(-15, 485, 405)"/> <!-- Nose shine -->

  <!-- Eyes (Asymmetrical & Crazy) -->
  <g stroke="#1A110D" stroke-width="4">
    <!-- Left Eye (Squinting) -->
    <path d="M 410 350 Q 440 320 470 350 Q 440 370 410 350 Z" fill="#FBC02D"/>
    <!-- Right Eye (Wide open) -->
    <circle cx="550" cy="340" r="28" fill="#FBC02D"/>
  </g>

  <!-- Pupils -->
  <!-- Left Pupil (Pinprick) -->
  <circle cx="445" cy="348" r="4" fill="#1A110D"/>
  <!-- Right Pupil (Dilated) -->
  <circle cx="550" cy="340" r="14" fill="#1A110D"/>

  <!-- Eye Catchlights -->
  <circle cx="446" cy="346" r="1.5" fill="#FFF"/>
  <circle cx="554" cy="334" r="4" fill="#FFF"/>

  <!-- Under-eye bags (Degenerate gambler look) -->
  <path d="M 405 365 Q 440 395 475 365" fill="none" stroke="#5D4037" stroke-width="4" stroke-linecap="round"/>
  <path d="M 515 375 Q 550 410 585 375" fill="none" stroke="#5D4037" stroke-width="4" stroke-linecap="round"/>

  <!-- Heavy Eyebrows -->
  <path d="M 390 330 Q 430 290 480 340" fill="none" stroke="#1A110D" stroke-width="12" stroke-linecap="round"/>
  <path d="M 510 320 Q 560 260 600 310" fill="none" stroke="#1A110D" stroke-width="14" stroke-linecap="round"/>

  <!-- Sweat/Drool Drop -->
  <path d="M 410 500 Q 415 530 410 540 Q 405 530 410 500 Z" fill="#81D4FA" opacity="0.7"/>
  <path d="M 645 420 Q 652 450 645 460 Q 638 450 645 420 Z" fill="#81D4FA" opacity="0.7"/>

  <!-- Spiked Collar -->
  <path d="M 350 540 Q 500 620 650 540 L 660 570 Q 500 660 340 570 Z" fill="#1A110D" filter="url(#shadow)"/>
  <g fill="#B0BEC5" stroke="#455A64" stroke-width="1">
    <polygon points="380,560 390,600 400,565"/>
    <polygon points="430,575 440,620 450,582"/>
    <polygon points="490,590 500,640 510,595"/>
    <polygon points="550,582 560,620 570,575"/>
    <polygon points="600,565 610,600 620,560"/>
  </g>

  <!-- Dealer Visor (Green Poker Hat) -->
  <g filter="url(#shadow)">
    <!-- Brim -->
    <path d="M 320 300 C 400 380, 600 380, 680 300 C 600 330, 400 330, 320 300 Z" fill="#1B5E20" stroke="#111" stroke-width="3"/>
    <!-- Brim Highlight -->
    <path d="M 330 305 C 410 370, 590 370, 670 305 C 590 320, 410 320, 330 305 Z" fill="#FFF" opacity="0.15"/>
    <!-- Head Strap -->
    <path d="M 310 290 C 350 240, 650 240, 690 290 L 680 305 C 640 260, 360 260, 320 305 Z" fill="#212121" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Cigar in Mouth -->
  <g transform="translate(560, 475) rotate(-15)" filter="url(#lightShadow)">
    <rect x="0" y="-10" width="80" height="20" rx="4" fill="#4E342E" stroke="#211A16" stroke-width="2"/>
    <path d="M 15 -10 L 25 -10 L 20 10 L 10 10 Z" fill="#3E2723"/> <!-- Cigar band texture -->
    <path d="M 40 -10 L 50 -10 L 45 10 L 35 10 Z" fill="#3E2723"/>
    <!-- Ash -->
    <rect x="80" y="-9" width="18" height="18" rx="3" fill="#9E9E9E" stroke="#424242" stroke-width="1"/>
    <path d="M 85 -9 L 88 9 M 92 -9 L 90 9" stroke="#757575" stroke-width="2"/> <!-- Ash texture -->
    <!-- Glowing Tip -->
    <ellipse cx="98" cy="0" rx="6" ry="8" fill="#FF3D00" filter="url(#glow)"/>
    <ellipse cx="98" cy="0" rx="3" ry="5" fill="#FFEA00"/>
    <!-- Smoke from Cigar -->
    <path d="M 100 -5 Q 120 -30 90 -60 T 110 -120 T 70 -180" fill="none" stroke="#E0E0E0" stroke-width="8" opacity="0.4" filter="url(#blur)"/>
    <path d="M 105 0 Q 135 -20 100 -50 T 120 -110 T 85 -170" fill="none" stroke="#FFF" stroke-width="4" opacity="0.6" filter="url(#blur)"/>
  </g>

  <!-- ================= THE POKER TABLE ================= -->
  <!-- Table Outer Wooden Rail -->
  <ellipse cx="500" cy="850" rx="850" ry="320" fill="#3E2723" stroke="#2D1A11" stroke-width="50" filter="url(#shadow)"/>
  <!-- Rail Highlight -->
  <ellipse cx="500" cy="850" rx="825" ry="295" fill="none" stroke="#5D4037" stroke-width="12" opacity="0.8"/>
  
  <!-- Green Felt Surface -->
  <ellipse cx="500" cy="850" rx="800" ry="270" fill="url(#tableGlow)"/>
  <!-- Felt Inner Line (Casino Table Detail) -->
  <ellipse cx="500" cy="850" rx="760" ry="240" fill="none" stroke="#FDD835" stroke-width="3" opacity="0.4"/>


  <!-- ================= TABLE ELEMENTS (MIDGROUND) ================= -->
  
  <!-- Whiskey Glass -->
  <g transform="translate(180, 660)" filter="url(#lightShadow)">
    <!-- Back of glass -->
    <path d="M 0 0 L 60 0 L 50 70 L 10 70 Z" fill="#FFF" opacity="0.1"/>
    <ellipse cx="30" cy="70" rx="20" ry="5" fill="#FFF" opacity="0.2"/>
    <!-- Whiskey Liquid -->
    <path d="M 5 25 L 55 25 L 48 65 L 12 65 Z" fill="#E65100" opacity="0.85"/>
    <ellipse cx="30" cy="25" rx="25" ry="6" fill="#FFB300" opacity="0.7"/>
    <!-- Ice Cubes -->
    <rect x="15" y="35" width="20" height="20" rx="2" fill="#FFF" opacity="0.5" transform="rotate(15, 25, 45)"/>
    <rect x="30" y="45" width="18" height="18" rx="2" fill="#FFF" opacity="0.4" transform="rotate(-20, 39, 54)"/>
    <!-- Front of glass -->
    <path d="M 0 0 L 60 0 L 50 70 L 10 70 Z" fill="none" stroke="#FFF" stroke-width="3" opacity="0.5"/>
    <ellipse cx="30" cy="0" rx="30" ry="8" fill="none" stroke="#FFF" stroke-width="3" opacity="0.7"/>
    <path d="M 12 10 L 18 60" stroke="#FFF" stroke-width="2" opacity="0.6"/> <!-- Glass reflection -->
  </g>

  <!-- Left Paw Resting/Guarding Chips -->
  <g filter="url(#shadow)">
    <!-- Arm base -->
    <path d="M 50 900 C 50 750, 200 700, 280 800 L 150 900 Z" fill="#9C8171"/>
    <ellipse cx="140" cy="820" rx="15" ry="25" fill="#3A251E" opacity="0.8" transform="rotate(30, 140, 820)"/>
    <ellipse cx="190" cy="850" rx="20" ry="15" fill="#3A251E" opacity="0.8" transform="rotate(-15, 190, 850)"/>
    
    <!-- Paws/Fingers -->
    <g fill="#7A6153" stroke="#211A16" stroke-width="2">
      <ellipse cx="290" cy="780" rx="35" ry="20" transform="rotate(25, 290, 780)"/>
      <ellipse cx="250" cy="790" rx="35" ry="20" transform="rotate(10, 250, 790)"/>
      <ellipse cx="200" cy="805" rx="35" ry="20" transform="rotate(-5, 200, 805)"/>
    </g>
    <!-- Sharp Claws -->
    <g fill="#1A110D">
      <path d="M 315 765 L 340 760 L 320 780 Z"/>
      <path d="M 275 775 L 295 765 L 285 790 Z"/>
      <path d="M 225 790 L 235 775 L 235 800 Z"/>
    </g>
  </g>

  <!-- Chips Stacks (Behind and beside the left paw) -->
  <g filter="url(#shadow)">
    <!-- Red Chips Stack -->
    <g style="color: #D32F2F" transform="translate(360, 730)">
      <use href="#chip" y="0"/>
      <use href="#chip" y="-9"/>
      <use href="#chip" y="-18"/>
      <use href="#chip" y="-27"/>
      <use href="#chip" y="-36"/>
      <use href="#chip" y="-45"/>
      <use href="#chip" y="-54"/>
    </g>
    <!-- Blue Chips Stack -->
    <g style="color: #1976D2" transform="translate(290, 750)">
      <use href="#chip" y="0"/>
      <use href="#chip" y="-9"/>
      <use href="#chip" y="-18"/>
      <use href="#chip" y="-27"/>
      <use href="#chip" y="-36"/>
    </g>
    <!-- Scattered Gold/Black Chips -->
    <g style="color: #FFC107" transform="translate(420, 750)">
      <use href="#chip" y="0"/>
      <use href="#chip" y="-9"/>
    </g>
    <use href="#chip" x="380" y="765" style="color: #4CAF50"/>
    <use href="#chip" x="450" y="745" style="color: #D32F2F"/>
  </g>

  <!-- Community Cards (The Flop) on the Table -->
  <g transform="translate(500, 680) scale(1, 0.6) skewX(-40) rotate(-10)" filter="url(#shadow)">
    <!-- Flop Card 1 -->
    <g transform="translate(-100, 0) rotate(-5)">
      <use href="#flop-card-bg"/>
      <text x="8" y="22" fill="#111" font-family="Arial, sans-serif" font-weight="bold" font-size="20">A</text>
      <text x="30" y="60" fill="#111" font-family="Arial, sans-serif" font-size="36" text-anchor="middle">♠</text>
    </g>
    <!-- Flop Card 2 -->
    <g transform="translate(-30, 5) rotate(2)">
      <use href="#flop-card-bg"/>
      <text x="8" y="22" fill="#111" font-family="Arial, sans-serif" font-weight="bold" font-size="20">K</text>
      <text x="30" y="60" fill="#111" font-family="Arial, sans-serif" font-size="36" text-anchor="middle">♠</text>
    </g>
    <!-- Flop Card 3 -->
    <g transform="translate(40, -5) rotate(12)">
      <use href="#flop-card-bg"/>
      <text x="8" y="22" fill="#D32F2F" font-family="Arial, sans-serif" font-weight="bold" font-size="20">K</text>
      <text x="30" y="60" fill="#D32F2F" font-family="Arial, sans-serif" font-size="36" text-anchor="middle">♦</text>
    </g>
  </g>


  <!-- ================= FOREGROUND (RIGHT PAW & HAND CARDS) ================= -->
  
  <!-- Right Arm coming up from bottom -->
  <path d="M 950 900 C 950 750, 850 650, 700 750 L 750 900 Z" fill="#9C8171" filter="url(#shadow)"/>
  
  <!-- Fur spots on right arm -->
  <g fill="#3A251E" opacity="0.8">
    <ellipse cx="850" cy="800" rx="20" ry="12" transform="rotate(-20, 850, 800)"/>
    <ellipse cx="780" cy="850" rx="15" ry="25" transform="rotate(15, 780, 850)"/>
    <ellipse cx="900" cy="870" rx="25" ry="15" transform="rotate(5, 900, 870)"/>
  </g>

  <!-- The Winning Hand (Royal Flush in Hearts) -->
  <g id="winning-hand">
    <g transform="translate(630, 640) rotate(-22)"><use href="#card-bg"/><text x="8" y="24" fill="#D32F2F" font-family="Arial, sans-serif" font-weight="bold" font-size="22">10</text><text x="35" y="70" fill="#D32F2F" font-family="Arial, sans-serif" font-size="45" text-anchor="middle">♥</text></g>
    <g transform="translate(670, 605) rotate(-11)"><use href="#card-bg"/><text x="8" y="24" fill="#D32F2F" font-family="Arial, sans-serif" font-weight="bold" font-size="22">J</text><text x="35" y="70" fill="#D32F2F" font-family="Arial, sans-serif" font-size="45" text-anchor="middle">♥</text></g>
    <g transform="translate(715, 585) rotate(0)"><use href="#card-bg"/><text x="8" y="24" fill="#D32F2F" font-family="Arial, sans-serif" font-weight="bold" font-size="22">Q</text><text x="35" y="70" fill="#D32F2F" font-family="Arial, sans-serif" font-size="45" text-anchor="middle">♥</text></g>
    <g transform="translate(760, 580) rotate(11)"><use href="#card-bg"/><text x="8" y="24" fill="#D32F2F" font-family="Arial, sans-serif" font-weight="bold" font-size="22">K</text><text x="35" y="70" fill="#D32F2F" font-family="Arial, sans-serif" font-size="45" text-anchor="middle">♥</text></g>
    <g transform="translate(805, 595) rotate(22)"><use href="#card-bg"/><text x="8" y="24" fill="#D32F2F" font-family="Arial, sans-serif" font-weight="bold" font-size="22">A</text><text x="35" y="70" fill="#D32F2F" font-family="Arial, sans-serif" font-size="45" text-anchor="middle">♥</text></g>
  </g>

  <!-- Right Paw Covering the Bottom of the Cards -->
  <g filter="url(#shadow)">
    <path d="M 600 850 C 600 720, 750 680, 880 750 L 900 850 Z" fill="#9C8171"/>
    <!-- Back Fingers holding the cards -->
    <g fill="#7A6153" stroke="#211A16" stroke-width="2">
      <ellipse cx="660" cy="710" rx="35" ry="20" transform="rotate(-25, 660, 710)"/>
      <ellipse cx="715" cy="690" rx="35" ry="20" transform="rotate(-10, 715, 690)"/>
      <ellipse cx="775" cy="690" rx="35" ry="20" transform="rotate(10, 775, 690)"/>
      <ellipse cx="830" cy="715" rx="35" ry="20" transform="rotate(25, 830, 715)"/>
    </g>
    <!-- The Big Thumb overlapping the front -->
    <ellipse cx="740" cy="750" rx="55" ry="30" fill="#6D5144" stroke="#211A16" stroke-width="2" transform="rotate(-15, 740, 750)"/>
    <!-- Thumb Claw -->
    <path d="M 685 735 L 660 720 L 680 750 Z" fill="#1A110D"/>
    <!-- Finger Claws (peeking over) -->
    <g fill="#1A110D">
      <path d="M 640 685 L 630 660 L 655 680 Z"/>
      <path d="M 700 665 L 695 640 L 715 660 Z"/>
      <path d="M 770 660 L 775 635 L 785 660 Z"/>
      <path d="M 840 680 L 855 655 L 850 685 Z"/>
    </g>
  </g>

  <!-- ================= LIGHTING / FOREGROUND ATMOSPHERE ================= -->
  <!-- Top Spotlight Beam -->
  <polygon points="300,-100 700,-100 950,800 50,800" fill="#FFF" opacity="0.04"/>
  <polygon points="400,-100 600,-100 750,800 250,800" fill="#FFF" opacity="0.03"/>

  <!-- Dust/Smoke particles in the air -->
  <circle cx="350" cy="400" r="15" fill="#FFF" opacity="0.05" filter="url(#blur)"/>
  <circle cx="650" cy="250" r="25" fill="#FFF" opacity="0.05" filter="url(#blur)"/>
  <circle cx="200" cy="600" r="30" fill="#FFF" opacity="0.03" filter="url(#blur)"/>
  <circle cx="800" cy="450" r="20" fill="#FFF" opacity="0.04" filter="url(#blur)"/>

  <!-- Final Dark Vignette Overlay for Moody Contrast -->
  <rect width="1000" height="800" fill="url(#vignette)" style="mix-blend-mode: multiply;" opacity="0.5"/>

</svg>